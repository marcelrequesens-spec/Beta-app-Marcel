<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Trading Pro - Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts@3.45.0/dist/apexcharts.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Sora:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <style>
        * { font-family: 'Inter', sans-serif; }
        h1, h2, h3, h4, h5, h6 { font-family: 'Sora', sans-serif; }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1a1f3a 50%, #16213e 100%);
            min-height: 100vh;
            color: #e2e8f0;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #4f46e5; border-radius: 4px; }

        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(148, 163, 184, 0.2); }
        .gradient-text { background: linear-gradient(135deg, #6366f1, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .card-premium { background: rgba(30, 41, 59, 0.8); border: 1px solid rgba(99, 102, 241, 0.3); border-radius: 16px; padding: 24px; transition: all 0.3s; }
        .card-premium:hover { border-color: rgba(99, 102, 241, 0.6); transform: translateY(-4px); box-shadow: 0 20px 50px rgba(99, 102, 241, 0.2); }

        .btn-primary { background: linear-gradient(135deg, #6366f1, #3b82f6); padding: 12px 24px; border-radius: 10px; color: white; border: none; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 15px 35px rgba(99, 102, 241, 0.4); }
        .btn-primary:active { transform: translateY(0); }

        .stat-card { background: linear-gradient(135deg, rgba(99, 102, 241, 0.15), rgba(59, 130, 246, 0.15)); border: 1px solid rgba(99, 102, 241, 0.3); padding: 20px; border-radius: 14px; }

        .chart-box { background: rgba(15, 23, 42, 0.9); border: 1px solid rgba(99, 102, 241, 0.2); border-radius: 16px; padding: 24px; }

        .nav-item { padding: 12px 16px; cursor: pointer; border-left: 3px solid transparent; transition: all 0.3s; border-radius: 0 8px 8px 0; }
        .nav-item:hover { background: rgba(99, 102, 241, 0.1); }
        .nav-item.active { border-left-color: #6366f1; background: rgba(99, 102, 241, 0.15); }

        .market-card { background: rgba(30, 41, 59, 0.6); border: 1px solid rgba(99, 102, 241, 0.2); padding: 16px; border-radius: 12px; cursor: pointer; transition: all 0.3s; }
        .market-card:hover { border-color: #6366f1; transform: translateY(-2px); }
        .market-price { font-size: 28px; font-weight: 700; color: #3b82f6; }
        .market-change { font-size: 13px; margin-top: 4px; }
        .positive { color: #10b981; }
        .negative { color: #ef4444; }

        .table-header { background: rgba(99, 102, 241, 0.1); padding: 16px; border-bottom: 1px solid rgba(99, 102, 241, 0.3); font-weight: 600; }
        .table-row { padding: 16px; border-bottom: 1px solid rgba(148, 163, 184, 0.1); transition: background 0.2s; }
        .table-row:hover { background: rgba(99, 102, 241, 0.05); }

        .roulette-container { perspective: 1000px; }
        .roulette-wheel { width: 280px; height: 280px; background: conic-gradient(red 0deg 18deg, black 18deg 36deg, red 36deg 54deg, black 54deg 72deg, red 72deg 90deg, black 90deg 108deg, red 108deg 126deg, black 126deg 144deg, red 144deg 162deg, black 162deg 180deg, red 180deg 198deg, black 198deg 216deg, red 216deg 234deg, black 234deg 252deg, red 252deg 270deg, black 270deg 288deg, red 288deg 306deg, black 306deg 324deg, red 324deg 342deg, black 342deg 360deg); border-radius: 50%; position: relative; box-shadow: 0 0 80px rgba(99, 102, 241, 0.5), inset 0 0 80px rgba(0, 0, 0, 0.8); }
        .roulette-ball { position: absolute; width: 18px; height: 18px; background: radial-gradient(circle at 30% 30%, #fbbf24, #f59e0b); border-radius: 50%; top: -9px; left: calc(50% - 9px); box-shadow: 0 4px 16px rgba(251, 191, 36, 0.8); }
        .spinning { animation: spin 3s linear; }
        @keyframes spin { to { transform: rotate(720deg); } }

        .blackjack-table { background: radial-gradient(ellipse at center, rgba(34, 197, 94, 0.1), rgba(15, 23, 42, 1)); border: 2px solid #22c55e; border-radius: 50%; padding: 40px; aspect-ratio: 1; }
        .hand-area { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
        .card { width: 70px; height: 100px; background: white; border: 2px solid #1f2937; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: bold; box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4); }
        .card.red { color: #ef4444; }
        .card.black { color: #1f2937; }

        .league-rank { display: inline-flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 50%; font-weight: 700; font-size: 14px; }
        .rank-1 { background: linear-gradient(135deg, #fbbf24, #f59e0b); color: #1f2937; }
        .rank-2 { background: linear-gradient(135deg, #d1d5db, #9ca3af); color: #1f2937; }
        .rank-3 { background: linear-gradient(135deg, #d97706, #b45309); color: white; }
        .rank-other { background: rgba(99, 102, 241, 0.3); color: white; }
    </style>
</head>
<body>
    <div class="flex h-screen bg-slate-950">
        <!-- SIDEBAR -->
        <div class="w-72 bg-gradient-to-b from-slate-900 via-slate-900 to-slate-950 border-r border-slate-800 overflow-y-auto p-6">
            <div class="mb-12">
                <h1 class="text-4xl font-bold gradient-text mb-2">ELITE</h1>
                <p class="text-xs text-gray-500">TRADING PRO</p>
            </div>
            <nav id="navbar" class="space-y-1"></nav>
        </div>

        <!-- MAIN CONTENT -->
        <div class="flex-1 overflow-y-auto bg-gradient-to-br from-slate-900 via-slate-950 to-slate-900">
            <div id="content" class="p-8 max-w-7xl mx-auto"></div>
        </div>
    </div>

    <script>
        // =========== STATE ===========
        const STATE = {
            user: null,
            page: 'login',
            portfolio: [],
            charts: {}
        };

        const MARKETS = {
            crypto: [
                { id: 'BTC', name: 'Bitcoin', icon: '₿', price: 67500, vol: 8000 },
                { id: 'ETH', name: 'Ethereum', icon: 'Ξ', price: 3580, vol: 500 },
                { id: 'SOL', name: 'Solana', icon: '◎', price: 215, vol: 40 }
            ],
            stocks: [
                { id: 'AAPL', name: 'Apple', icon: '🍎', price: 230, vol: 20 },
                { id: 'TSLA', name: 'Tesla', icon: '⚡', price: 252, vol: 30 },
                { id: 'MSFT', name: 'Microsoft', icon: '💻', price: 425, vol: 40 }
            ]
        };

        const DB = {
            save: (k, v) => localStorage.setItem(`elite_${k}`, JSON.stringify(v)),
            load: (k) => JSON.parse(localStorage.getItem(`elite_${k}`)) || null,
            getUser: () => DB.load('user'),
            setUser: (u) => DB.save('user', u),
            getPortfolio: (id) => DB.load(`port_${id}`) || [],
            setPortfolio: (id, p) => DB.save(`port_${id}`, p)
        };

        // =========== UTILS ===========
        function getPrice(asset) {
            return asset.price + (Math.random() - 0.5) * asset.vol;
        }

        function getPriceHistory(asset, days = 30) {
            const history = [];
            let price = asset.price;
            for (let i = 0; i < days; i++) {
                price += (Math.random() - 0.5) * asset.vol;
                history.push(Math.round(price * 100) / 100);
            }
            return history;
        }

        // =========== NAVBAR ===========
        function renderNavbar() {
            const items = [
                { page: 'dashboard', label: '📊 Dashboard' },
                { page: 'markets', label: '📈 Mercados' },
                { page: 'portfolio', label: '💼 Portafolio' },
                { page: 'casino', label: '🎰 Casino' },
                { page: 'leagues', label: '🏆 Ligas' },
                { page: 'analytics', label: '📉 Analytics' },
                { page: 'education', label: '📚 Educación' },
                { page: 'logout', label: '🚪 Salir' }
            ];

            document.getElementById('navbar').innerHTML = items.map(i => `
                <div class="nav-item ${STATE.page === i.page ? 'active' : ''}" onclick="navigate('${i.page}')">${i.label}</div>
            `).join('');
        }

        function navigate(page) {
            if (page === 'logout') {
                localStorage.clear();
                STATE.user = null;
            }
            STATE.page = page;
            render();
        }

        // =========== LOGIN ===========
        function handleLogin() {
            const name = document.getElementById('name-input')?.value || '';
            if (!name.trim()) return alert('Nombre requerido');
            STATE.user = {
                id: Date.now(),
                name,
                balance: 100000,
                won: 0,
                lost: 0
            };
            DB.setUser(STATE.user);
            STATE.page = 'dashboard';
            render();
        }

        // =========== DASHBOARD ===========
        function renderDashboard() {
            const portfolio = DB.getPortfolio(STATE.user.id);
            const invested = portfolio.reduce((s, p) => s + p.buyPrice * p.amount, 0);
            const roi = ((STATE.user.won - STATE.user.lost) / 100000 * 100).toFixed(2);

            return `
                <div class="animate__animated animate__fadeIn">
                    <h1 class="text-5xl font-bold gradient-text mb-10">Dashboard</h1>

                    <!-- TOP STATS -->
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
                        <div class="stat-card">
                            <p class="text-gray-400 text-sm mb-2">SALDO</p>
                            <p class="text-3xl font-bold text-green-400">$${STATE.user.balance.toLocaleString('en', {maximumFractionDigits: 0})}</p>
                        </div>
                        <div class="stat-card">
                            <p class="text-gray-400 text-sm mb-2">INVERTIDO</p>
                            <p class="text-3xl font-bold text-blue-400">$${Math.round(invested).toLocaleString('en', {maximumFractionDigits: 0})}</p>
                        </div>
                        <div class="stat-card">
                            <p class="text-gray-400 text-sm mb-2">GANANCIA</p>
                            <p class="text-3xl font-bold text-emerald-400">$${STATE.user.won.toLocaleString('en', {maximumFractionDigits: 0})}</p>
                        </div>
                        <div class="stat-card">
                            <p class="text-gray-400 text-sm mb-2">ROI</p>
                            <p class="text-3xl font-bold ${roi >= 0 ? 'text-green-400' : 'text-red-400'}">${roi}%</p>
                        </div>
                    </div>

                    <!-- QUICK ACCESS -->
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                        <div class="card-premium text-center cursor-pointer hover:scale-105" onclick="navigate('markets')">
                            <p class="text-4xl mb-2">📈</p>
                            <p class="font-bold">Trading</p>
                        </div>
                        <div class="card-premium text-center cursor-pointer hover:scale-105" onclick="navigate('casino')">
                            <p class="text-4xl mb-2">🎰</p>
                            <p class="font-bold">Casino</p>
                        </div>
                        <div class="card-premium text-center cursor-pointer hover:scale-105" onclick="navigate('portfolio')">
                            <p class="text-4xl mb-2">💼</p>
                            <p class="font-bold">Portfolio</p>
                        </div>
                        <div class="card-premium text-center cursor-pointer hover:scale-105" onclick="navigate('analytics')">
                            <p class="text-4xl mb-2">📊</p>
                            <p class="font-bold">Analytics</p>
                        </div>
                    </div>

                    <!-- PORTFOLIO PREVIEW -->
                    ${portfolio.length > 0 ? `
                        <div class="card-premium mb-8">
                            <h2 class="text-2xl font-bold mb-4">Posiciones Activas</h2>
                            <div class="space-y-2">
                                ${portfolio.slice(0, 5).map(p => {
                                    const asset = [...MARKETS.crypto, ...MARKETS.stocks].find(a => a.id === p.symbol);
                                    const price = getPrice(asset);
                                    const change = ((price - p.buyPrice) / p.buyPrice * 100).toFixed(2);
                                    return `
                                        <div class="flex justify-between p-3 bg-slate-800 rounded-lg">
                                            <span class="font-bold">${p.symbol}: ${p.amount} @ $${p.buyPrice.toFixed(2)}</span>
                                            <span class="${change >= 0 ? 'positive' : 'negative'}">${change >= 0 ? '+' : ''}${change}%</span>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        </div>
                    ` : ''}
                </div>
            `;
        }

        // =========== MARKETS ===========
        function renderMarkets() {
            const all = [...MARKETS.crypto, ...MARKETS.stocks];
            return `
                <div class="animate__animated animate__fadeIn">
                    <h1 class="text-5xl font-bold gradient-text mb-10">Mercados Disponibles</h1>

                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        ${all.map(a => {
                            const price = getPrice(a);
                            const change = (Math.random() - 0.5) * 5;
                            return `
                                <div class="market-card">
                                    <div class="flex justify-between mb-4">
                                        <div>
                                            <p class="text-gray-400 text-xs">${a.id}</p>
                                            <p class="font-bold text-lg">${a.name}</p>
                                        </div>
                                        <p class="text-3xl">${a.icon}</p>
                                    </div>
                                    <p class="market-price">$${price.toFixed(2)}</p>
                                    <p class="market-change ${change >= 0 ? 'positive' : 'negative'}">${change >= 0 ? '+' : ''}${change.toFixed(2)}%</p>
                                    <button onclick="buyAsset('${a.id}')" class="btn-primary w-full mt-4">Invertir</button>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
            `;
        }

        function buyAsset(id) {
            const amount = prompt(`¿Cuántas unidades de ${id}?`);
            if (!amount) return;
            const asset = [...MARKETS.crypto, ...MARKETS.stocks].find(a => a.id === id);
            const price = getPrice(asset);
            const cost = price * parseFloat(amount);
            if (cost > STATE.user.balance) return alert('Saldo insuficiente');
            STATE.user.balance -= cost;
            const port = DB.getPortfolio(STATE.user.id);
            port.push({ symbol: id, amount: parseFloat(amount), buyPrice: price });
            DB.setUser(STATE.user);
            DB.setPortfolio(STATE.user.id, port);
            alert(`✅ Compraste ${amount} ${id}`);
            render();
        }

        // =========== CASINO ===========
        function renderCasino() {
            return `
                <div class="animate__animated animate__fadeIn">
                    <h1 class="text-5xl font-bold gradient-text mb-10">🎰 Casino Profesional</h1>

                    <div class="card-premium mb-8">
                        <div class="flex flex-col items-center gap-8">
                            <div class="roulette-container">
                                <div class="roulette-wheel" id="wheel">
                                    <div class="roulette-ball"></div>
                                </div>
                            </div>

                            <div class="w-full max-w-md">
                                <div class="mb-4">
                                    <label class="text-sm font-bold mb-2 block">Apuesta</label>
                                    <input type="number" id="bet" max="${STATE.user.balance}" placeholder="$" class="w-full px-4 py-3 bg-slate-800 border border-slate-600 rounded-lg text-white">
                                </div>
                                <button onclick="spin()" class="btn-primary w-full py-4 text-lg font-bold">GIRAR</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function spin() {
            const bet = parseFloat(document.getElementById('bet')?.value || 0);
            if (bet <= 0 || bet > STATE.user.balance) return alert('Apuesta inválida');
            STATE.user.balance -= bet;
            const wheel = document.getElementById('wheel');
            wheel.classList.add('spinning');
            setTimeout(() => {
                const won = Math.random() > 0.486;
                if (won) {
                    STATE.user.balance += bet * 2;
                    STATE.user.won += bet;
                    alert('🎉 ¡GANASTE!');
                } else {
                    STATE.user.lost += bet;
                    alert('😢 Perdiste');
                }
                DB.setUser(STATE.user);
                wheel.classList.remove('spinning');
                document.getElementById('bet').value = '';
                render();
            }, 3000);
        }

        // =========== PORTFOLIO ===========
        function renderPortfolio() {
            const port = DB.getPortfolio(STATE.user.id);
            if (!port.length) return '<p class="text-center text-gray-400">Sin inversiones</p>';
            return `
                <div class="animate__animated animate__fadeIn">
                    <h1 class="text-5xl font-bold gradient-text mb-10">Mi Portafolio</h1>
                    ${port.map(p => {
                        const a = [...MARKETS.crypto, ...MARKETS.stocks].find(x => x.id === p.symbol);
                        const price = getPrice(a);
                        const pct = ((price - p.buyPrice) / p.buyPrice * 100).toFixed(2);
                        return `
                            <div class="card-premium mb-4">
                                <div class="flex justify-between">
                                    <div>
                                        <p class="text-xl font-bold">${p.symbol}</p>
                                        <p class="text-sm text-gray-400">${p.amount} @ $${p.buyPrice.toFixed(2)}</p>
                                    </div>
                                    <div class="text-right">
                                        <p class="text-2xl font-bold">$${(p.amount * price).toFixed(2)}</p>
                                        <p class="${pct >= 0 ? 'positive' : 'negative'}">${pct >= 0 ? '+' : ''}${pct}%</p>
                                    </div>
                                </div>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
        }

        // =========== LEAGUES ===========
        function renderLeagues() {
            return `
                <div class="animate__animated animate__fadeIn">
                    <h1 class="text-5xl font-bold gradient-text mb-10">🏆 Ligas Competitivas</h1>
                    <button onclick="createLeague()" class="btn-primary mb-8">+ Nueva Liga</button>
                    <p class="text-gray-400">Las ligas creadas aparecerán aquí</p>
                </div>
            `;
        }

        function createLeague() {
            const name = prompt('Nombre:');
            if (name) alert('Liga ' + name + ' creada');
        }

        // =========== ANALYTICS ===========
        function renderAnalytics() {
            const port = DB.getPortfolio(STATE.user.id);
            const roi = ((STATE.user.won - STATE.user.lost) / 100000 * 100).toFixed(2);
            return `
                <div class="animate__animated animate__fadeIn">
                    <h1 class="text-5xl font-bold gradient-text mb-10">📈 Análisis Detallado</h1>

                    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
                        <div class="stat-card">
                            <p class="text-gray-400 text-xs">ROI</p>
                            <p class="text-2xl font-bold ${roi >= 0 ? 'text-green-400' : 'text-red-400'}">${roi}%</p>
                        </div>
                        <div class="stat-card">
                            <p class="text-gray-400 text-xs">GANANCIA</p>
                            <p class="text-2xl font-bold positive">$${STATE.user.won}</p>
                        </div>
                        <div class="stat-card">
                            <p class="text-gray-400 text-xs">PÉRDIDA</p>
                            <p class="text-2xl font-bold negative">$${STATE.user.lost}</p>
                        </div>
                        <div class="stat-card">
                            <p class="text-gray-400 text-xs">POSICIONES</p>
                            <p class="text-2xl font-bold text-blue-400">${port.length}</p>
                        </div>
                    </div>

                    <div class="card-premium">
                        <h3 class="text-xl font-bold mb-4">Resumen Financiero</h3>
                        <div class="space-y-2">
                            <div class="flex justify-between p-3 bg-slate-800 rounded">
                                <span>Capital Inicial</span>
                                <span class="font-bold">$100,000</span>
                            </div>
                            <div class="flex justify-between p-3 bg-slate-800 rounded">
                                <span>Capital Actual</span>
                                <span class="font-bold">${STATE.user.balance.toLocaleString()}</span>
                            </div>
                            <div class="flex justify-between p-3 bg-slate-800 rounded">
                                <span>Neto (Gan - Per)</span>
                                <span class="font-bold positive">$${(STATE.user.won - STATE.user.lost).toLocaleString()}</span>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // =========== EDUCATION ===========
        function renderEducation() {
            return `
                <div class="animate__animated animate__fadeIn">
                    <h1 class="text-5xl font-bold gradient-text mb-10">📚 Centro Educativo</h1>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                        <div class="card-premium">
                            <p class="text-3xl mb-3">₿</p>
                            <h3 class="text-xl font-bold mb-2">Bitcoin</h3>
                            <p class="text-sm text-gray-400">Primera criptomoneda descentralizada. No controlada por gobiernos.</p>
                        </div>
                        <div class="card-premium">
                            <p class="text-3xl mb-3">Ξ</p>
                            <h3 class="text-xl font-bold mb-2">Ethereum</h3>
                            <p class="text-sm text-gray-400">Plataforma de contratos inteligentes y aplicaciones descentralizadas.</p>
                        </div>
                        <div class="card-premium">
                            <p class="text-3xl mb-3">◎</p>
                            <h3 class="text-xl font-bold mb-2">Solana</h3>
                            <p class="text-sm text-gray-400">Blockchain de alta velocidad para transacciones rápidas.</p>
                        </div>
                    </div>

                    <h2 class="text-2xl font-bold mb-4">Estrategias</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="card-premium">
                            <h3 class="font-bold mb-2">📊 DCA</h3>
                            <p class="text-sm text-gray-400">Invertir regularmente cantidades fijas</p>
                        </div>
                        <div class="card-premium">
                            <h3 class="font-bold mb-2">📈 Take Profit</h3>
                            <p class="text-sm text-gray-400">Vender en objetivos de ganancia</p>
                        </div>
                    </div>
                </div>
            `;
        }

        // =========== LOGIN ===========
        function renderLogin() {
            return `
                <div class="min-h-screen flex items-center justify-center">
                    <div class="w-full max-w-md">
                        <div class="card-premium p-10 text-center">
                            <h1 class="text-5xl font-bold gradient-text mb-3">ELITE PRO</h1>
                            <p class="text-gray-400 mb-8">Plataforma Premium de Trading</p>
                            <input type="text" id="name-input" placeholder="Tu nombre" class="w-full px-4 py-3 bg-slate-800 border border-slate-600 rounded-lg mb-4 text-white">
                            <button onclick="handleLogin()" class="btn-primary w-full py-3 text-lg">Comenzar</button>
                            <p class="text-xs text-gray-500 mt-6">$100,000 de capital ficticio</p>
                        </div>
                    </div>
                </div>
            `;
        }

        // =========== RENDER ===========
        function render() {
            renderNavbar();
            const content = document.getElementById('content');
            if (!STATE.user) {
                content.innerHTML = renderLogin();
                return;
            }
            switch (STATE.page) {
                case 'dashboard': content.innerHTML = renderDashboard(); break;
                case 'markets': content.innerHTML = renderMarkets(); break;
                case 'portfolio': content.innerHTML = renderPortfolio(); break;
                case 'casino': content.innerHTML = renderCasino(); break;
                case 'leagues': content.innerHTML = renderLeagues(); break;
                case 'analytics': content.innerHTML = renderAnalytics(); break;
                case 'education': content.innerHTML = renderEducation(); break;
                default: content.innerHTML = renderDashboard();
            }
        }

        STATE.user = DB.getUser();
        if (STATE.user) STATE.portfolio = DB.getPortfolio(STATE.user.id);
        render();
    </script>
</body>
</html>
