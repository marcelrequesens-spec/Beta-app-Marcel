<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <style>
        :root {
            --primary: #0066ff;
            --primary-dark: #0052cc;
            --secondary: #6366f1;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --border: #334155;
        }
        body {
            background: linear-gradient(135deg, var(--bg-dark) 0%, #1a1f35 100%);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            line-height: 1.6;
        }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(100, 116, 139, 0.2); }
        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; }
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0, 102, 255, 0.3); }
        .btn-danger { background: var(--danger); color: white; border: none; padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; }
        .btn-danger:hover { background: #dc2626; }
        .stat-box { background: linear-gradient(135deg, rgba(0, 102, 255, 0.1), rgba(99, 102, 241, 0.1)); border: 1px solid rgba(0, 102, 255, 0.3); border-radius: 12px; padding: 1.5rem; text-align: center; }
        .gradient-text { background: linear-gradient(135deg, #0066ff, #6366f1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .achievement-badge { background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.3); border-radius: 8px; padding: 1rem; text-align: center; transition: all 0.3s; }
        .achievement-badge.unlocked { background: rgba(16, 185, 129, 0.2); border-color: #10b981; box-shadow: 0 0 15px rgba(16, 185, 129, 0.3); }
        .achievement-badge:hover { transform: scale(1.05); }
        .rank-badge { display: inline-block; padding: 0.5rem 1rem; border-radius: 20px; font-weight: 600; font-size: 0.875rem; }
        .rank-bronze { background: rgba(217, 119, 6, 0.2); border: 1px solid #d97706; color: #d97706; }
        .rank-silver { background: rgba(148, 163, 184, 0.2); border: 1px solid #94a3b8; color: #94a3b8; }
        .rank-gold { background: rgba(251, 191, 36, 0.2); border: 1px solid #fbbf24; color: #fbbf24; }
        .rank-platinum { background: rgba(196, 181, 253, 0.2); border: 1px solid #c4b5fd; color: #c4b5fd; }
        .rank-diamond { background: rgba(34, 211, 238, 0.2); border: 1px solid #22d3ee; color: #22d3ee; }
        .market-item { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; cursor: pointer; transition: all 0.3s; }
        .market-item:hover { border-color: var(--primary); transform: translateY(-2px); }
        .market-item.selected { border-color: var(--primary); background: rgba(0, 102, 255, 0.1); }
        .leaderboard-row { background: var(--bg-card); border-bottom: 1px solid var(--border); padding: 1rem; display: flex; justify-content: space-between; align-items: center; }
        .leaderboard-row:first-child { background: linear-gradient(135deg, rgba(251, 191, 36, 0.1), rgba(251, 191, 36, 0.05)); border-left: 3px solid #fbbf24; }
        .chart-container { height: 300px; margin: 1rem 0; }
        .portfolio-item { background: rgba(0, 102, 255, 0.1); border-left: 3px solid var(--primary); border-radius: 6px; padding: 1rem; margin-bottom: 0.5rem; }
        .luxury-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 1rem; }
        .luxury-item { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; text-align: center; cursor: pointer; transition: all 0.3s; }
        .luxury-item:hover { transform: translateY(-4px); border-color: var(--primary); }
        .luxury-item.owned { border-color: var(--success); background: rgba(16, 185, 129, 0.1); }
        .tab-button { padding: 0.75rem 1rem; border: none; background: transparent; color: var(--text-secondary); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.3s; }
        .tab-button.active { color: var(--text-primary); border-bottom-color: var(--primary); }
        .price-badge { display: inline-block; background: linear-gradient(135deg, #10b981, #059669); color: white; padding: 0.25rem 0.75rem; border-radius: 4px; font-size: 0.875rem; font-weight: 600; }
        .loss-badge { background: linear-gradient(135deg, #ef4444, #dc2626); color: white; }
    </style>
</head>

            ]

        // ============ ACHIEVEMENTS ============
        const ACHIEVEMENTS = [
            { id: 'first-trade', name: 'Primer Trade', icon: '📈', cond: (u) => u.trades >= 1 },
            { id: 'millionaire', name: 'Millonario', icon: '💰', cond: (u) => u.balance >= 1000000 },
            { id: 'collector', name: 'Coleccionista', icon: '🏆', cond: (u) => u.luxuryItems.length >= 10 },
            { id: 'rich', name: 'Súper Rico', icon: '💎', cond: (u) => u.totalWon >= 500000 },
            { id: 'trader-pro', name: 'Trader Pro', icon: '📊', cond: (u) => u.trades >= 50 },
            { id: 'level-10', name: 'Maestro', icon: '🎖️', cond: (u) => u.level >= 10 }
        ];

        // ============ STATE ============
        let user = DB.getUser();
        let page = 'login';
        let selectedMarket = null;
        let portfolio = [];
        let leaderboard = [];

        function initUser(username) {
            user = {
                id: Date.now(),
                username,
                balance: 100000,
                totalInvested: 0,
                totalWon: 0,
                totalLost: 0,
                level: 1,
                experience: 0,
                luxuryItems: [],
                achievements: [],
                rank: 'Bronze',
                createdAt: new Date(),
                portfolio: [],
                trades: 0
            };
            DB.setUser(user);
            updateLeaderboard();
            portfolio = [];
        }

        function updateLeaderboard() {
            let lb = DB.getLeaderboard();
            lb = lb.filter(u => u.id !== user.id);
            lb.push({ username: user.username, balance: user.balance, level: user.level, rank: user.rank, luxuryCount: user.luxuryItems.length, id: user.id });
            lb.sort((a, b) => b.balance - a.balance);
            DB.setLeaderboard(lb.slice(0, 20));
            leaderboard = DB.getLeaderboard();
        }

        function buyAsset(symbol) {
            const qty = parseFloat(document.getElementById('qty-input')?.value || 0);
            if (qty <= 0) return alert('Cantidad inválida');

            const asset = Object.values(MARKETS).flat().find(a => a.symbol === symbol);
            if (!asset) return;

            const price = getPrice(asset);
            const total = price * qty;

            if (user.balance < total) {
                return alert(`Saldo insuficiente. Necesitas: $${total.toFixed(2)}\nTienes: $${user.balance.toFixed(2)}`);
            }

            user.balance -= total;
            user.totalInvested += total;
            user.trades++;
            user.experience += 10;
            portfolio.push({ symbol, name: asset.name, qty, buyPrice: price, date: new Date() });
            user.portfolio = portfolio;
            checkAchievements();
            checkLevelUp();

            DB.setUser(user);
            DB.setPortfolio(user.id, portfolio);
            updateLeaderboard();
            alert(`✅ Comprado ${qty} ${symbol} por $${total.toFixed(2)}`);
            document.getElementById('qty-input').value = '';
            render();
        }

        function sellAsset(index) {
            const holding = portfolio[index];
            const asset = Object.values(MARKETS).flat().find(a => a.symbol === holding.symbol);
            const currentPrice = getPrice(asset);
            const saleValue = holding.qty * currentPrice;
            const profit = saleValue - (holding.qty * holding.buyPrice);

            user.balance += saleValue;
            user.totalWon += Math.max(0, profit);
            user.totalLost += Math.max(0, -profit);
            user.experience += 5;

            portfolio.splice(index, 1);
            user.portfolio = portfolio;

            DB.setUser(user);
            DB.setPortfolio(user.id, portfolio);
            updateLeaderboard();
            alert(`✅ Vendido por $${saleValue.toFixed(2)} (${profit > 0 ? '+' : ''}$${profit.toFixed(2)})`);
            render();
        }

        function buyLuxury(itemId) {
            let item = null;
            for (const category in LUXURY_CATEGORIES) {
                const found = LUXURY_CATEGORIES[category].find(i => i.id === itemId);
                if (found) {
                    item = { ...found, category };
                    break;
                }
            }
            if (!item) return;

            if (user.balance < item.price) {
                return alert(`Saldo insuficiente. Necesitas: $${item.price}\nTienes: $${user.balance.toFixed(2)}`);
            }

            user.balance -= item.price;
            user.luxuryItems.push(item);
            user.experience += 25;
            checkAchievements();
            checkLevelUp();

            DB.setUser(user);
            updateLeaderboard();
            alert(`✅ ¡Compraste ${item.name}!`);
            render();
        }

        function playGame(game) {
            const bet = parseFloat(document.getElementById(`${game}-bet`)?.value || 0);
            if (bet <= 0 || user.balance < bet) return alert('Apuesta inválida');

            const won = Math.random() > 0.48;
            const multiplier = game === 'blackjack' ? 1.5 : 1;
            const payout = won ? bet * multiplier : 0;

            user.balance = user.balance - bet + payout;
            if (won) user.totalWon += payout;
            else user.totalLost += bet;

            DB.setUser(user);
            updateLeaderboard();
            alert(won ? `🎉 ¡GANASTE! +$${payout.toFixed(2)}` : `😢 Perdiste $${bet}`);
            document.getElementById(`${game}-bet`).value = '';
            render();
        }

        function checkLevelUp() {
            const newLevel = Math.floor(user.experience / 100) + 1;
            if (newLevel > user.level) {
                user.level = newLevel;
                const ranks = ['Bronze', 'Silver', 'Gold', 'Platinum', 'Diamond'];
                user.rank = ranks[Math.min(newLevel - 1, ranks.length - 1)];
            }
        }

        function checkAchievements() {
            ACHIEVEMENTS.forEach(ach => {
                if (!user.achievements.includes(ach.id) && ach.cond(user)) {
                    user.achievements.push(ach.id);
                }
            });
        }

        function logout() {
            localStorage.clear();
            user = null;
            page = 'login';
            render();
        }

        function getAllLuxuryItems() {
            let items = [];
            for (const category in LUXURY_CATEGORIES) {
                items = items.concat(LUXURY_CATEGORIES[category]);
            }
            return items;
        }

        // ============ RENDER ============
        function render() {
            const app = document.getElementById('app');
            if (!user) {
                app.innerHTML = `
                    <div class="min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-slate-950 to-blue-950">
                        <div class="w-full max-w-md">
                            <div class="glass rounded-2xl p-8 backdrop-blur-xl">
                                <h1 class="text-6xl font-bold gradient-text text-center mb-2">ELITE</h1>
                                <h2 class="text-3xl font-bold text-center mb-2">Trading Pro</h2>
                                <p class="text-center text-slate-400 mb-8">Investment & Casino Platform</p>
                                <div class="space-y-4">
                                    <input type="text" id="username" placeholder="Tu nombre de trader" maxlength="20" class="w-full px-4 py-3 bg-slate-800 border border-blue-500 rounded-lg text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500">
                                    <button onclick="if(document.getElementById('username').value.trim()) { initUser(document.getElementById('username').value.trim()); page='dashboard'; render(); }" class="w-full btn-primary py-3 rounded-lg text-white font-bold">
                                        Comenzar Trading
                                    </button>
                                </div>
                                <p class="text-center text-slate-400 text-xs mt-6">💰 Comienza con $100,000 ficticio</p>
                            </div>
                        </div>
                    </div>
                `;
                return;
            }

            portfolio = user.portfolio || [];
            if (page === 'dashboard') {
                const roi = user.totalInvested > 0 ? ((user.balance - 100000) / user.totalInvested * 100).toFixed(1) : 0;
                const rankClass = `rank-${user.rank.toLowerCase()}`;

                app.innerHTML = `
                    <div class="min-h-screen bg-gradient-to-br from-slate-950 to-blue-950 p-4">
                        <div class="max-w-7xl mx-auto">
                            <div class="flex justify-between items-center mb-8">
                                <div>
                                    <h1 class="text-4xl font-bold gradient-text">${user.username}</h1>
                                    <p class="text-slate-400">Nivel ${user.level} • <span class="rank-badge ${rankClass}">${user.rank}</span></p>
                                </div>
                                <button onclick="logout()" class="px-4 py-2 bg-red-600 rounded-lg text-sm font-bold hover:bg-red-700">Salir</button>
                            </div>

                            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
                                <div class="stat-box">
                                    <p class="text-slate-400 text-sm">Saldo</p>
                                    <p class="text-3xl font-bold text-blue-400">$${user.balance.toLocaleString('en-US', {maximumFractionDigits: 0})}</p>
                                </div>
                                <div class="stat-box">
                                    <p class="text-slate-400 text-sm">ROI</p>
                                    <p class="text-3xl font-bold text-green-400">${roi}%</p>
                                </div>
                                <div class="stat-box">
                                    <p class="text-slate-400 text-sm">Trades</p>
                                    <p class="text-3xl font-bold text-purple-400">${user.trades}</p>
                                </div>
                                <div class="stat-box">
                                    <p class="text-slate-400 text-sm">Posesiones</p>
                                    <p class="text-3xl font-bold text-yellow-400">${user.luxuryItems.length}</p>
                                </div>
                            </div>

                            <div class="grid grid-cols-1 md:grid-cols-4 gap-3 mb-8">
                                <button onclick="page='trading'; render()" class="card hover:border-blue-500 transition cursor-pointer text-center"><p class="text-3xl mb-2">📈</p><p class="font-bold">Trading</p><p class="text-xs text-slate-400">Mercados</p></button>
                                <button onclick="page='casino'; render()" class="card hover:border-red-500 transition cursor-pointer text-center"><p class="text-3xl mb-2">🎰</p><p class="font-bold">Casino</p><p class="text-xs text-slate-400">Juegos</p></button>
                                <button onclick="page='shop'; render()" class="card hover:border-yellow-500 transition cursor-pointer text-center"><p class="text-3xl mb-2">💎</p><p class="font-bold">Tienda</p><p class="text-xs text-slate-400">Lujos</p></button>
                                <button onclick="page='leaderboard'; render()" class="card hover:border-purple-500 transition cursor-pointer text-center"><p class="text-3xl mb-2">🏆</p><p class="font-bold">Rankings</p><p class="text-xs text-slate-400">Competencia</p></button>
                            </div>

                            ${portfolio.length > 0 ? `
                                <div class="card mb-8">
                                    <h3 class="text-xl font-bold mb-4 gradient-text">Mi Portafolio (${portfolio.length})</h3>
                                    <div class="space-y-2">
                                        ${portfolio.map((h, i) => {
                                            const asset = Object.values(MARKETS).flat().find(a => a.symbol === h.symbol);
                                            const current = getPrice(asset);
                                            const diff = current - h.buyPrice;
                                            return `
                                                <div class="portfolio-item flex justify-between items-center">
                                                    <div>
                                                        <p class="font-bold">${h.symbol} - ${h.name}</p>
                                                        <p class="text-xs text-slate-400">${h.qty} @ $${h.buyPrice.toFixed(2)}</p>
                                                    </div>
                                                    <div class="text-right">
                                                        <p class="font-bold">$${(h.qty * current).toFixed(2)}</p>
                                                        <p class="text-xs ${diff > 0 ? 'text-green-400' : 'text-red-400'}">${diff > 0 ? '+' : ''}${(diff * h.qty).toFixed(2)}</p>
                                                        <button onclick="sellAsset(${i})" class="mt-1 px-2 py-1 bg-red-600 text-xs rounded hover:bg-red-700">Vender</button>
                                                    </div>
                                                </div>
                                            `;
                                        }).join('')}
                                    </div>
                                </div>
                            ` : ''}
                        </div>
                    </div>
                `;
            } else if (page === 'trading') {
                app.innerHTML = `
                    <div class="min-h-screen bg-gradient-to-br from-slate-950 to-blue-950 p-4">
                        <div class="max-w-7xl mx-auto">
                            <button onclick="page='dashboard'; render()" class="mb-4 px-4 py-2 bg-slate-700 rounded-lg text-sm">← Atrás</button>
                            <h2 class="text-3xl font-bold gradient-text mb-6">📈 Mercados de Trading</h2>

                            ${Object.entries(MARKETS).map(([type, assets]) => `
                                <div class="mb-8">
                                    <h3 class="text-2xl font-bold mb-4 capitalize">${type === 'crypto' ? 'Criptomonedas' : type === 'stocks' ? 'Acciones' : 'Commodities'}</h3>
                                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                                        ${assets.map(a => {
                                            const price = getPrice(a);
                                            return `
                                                <div class="market-item">
                                                    <p class="text-3xl mb-2">${a.icon}</p>
                                                    <h4 class="font-bold text-lg">${a.symbol}</h4>
                                                    <p class="text-sm text-slate-400 mb-2">${a.name}</p>
                                                    <p class="text-2xl font-bold text-green-400">$${price.toFixed(2)}</p>
                                                    <p class="text-xs ${a.change > 0 ? 'text-green-400' : 'text-red-400'} mb-3">${a.change > 0 ? '+' : ''}${a.change}%</p>
                                                    <div class="flex gap-2">
                                                        <input type="number" id="qty-input" placeholder="Cantidad" step="0.001" min="0" class="flex-1 px-2 py-1 bg-slate-800 border border-slate-700 rounded text-white text-sm">
                                                        <button onclick="buyAsset('${a.symbol}')" class="px-3 py-1 btn-primary text-sm rounded">Comprar</button>
                                                    </div>
                                                </div>
                                            `;
                                        }).join('')}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            } else if (page === 'casino') {
                app.innerHTML = `
                    <div class="min-h-screen bg-gradient-to-br from-slate-950 to-red-950 p-4">
                        <div class="max-w-4xl mx-auto">
                            <button onclick="page='dashboard'; render()" class="mb-4 px-4 py-2 bg-slate-700 rounded-lg text-sm">← Atrás</button>
                            <h2 class="text-3xl font-bold gradient-text mb-6">🎰 Casino Elite</h2>
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                                <div class="card border-l-4 border-red-500">
                                    <h3 class="text-xl font-bold mb-4">🎡 Ruleta</h3>
                                    <p class="text-sm text-slate-400 mb-4">50% de probabilidad de ganar (x1)</p>
                                    <input type="number" id="roulette-bet" placeholder="Apuesta" min="1" class="w-full px-3 py-2 bg-slate-800 border border-slate-700 rounded-lg text-white mb-2">
                                    <button onclick="playGame('roulette')" class="w-full btn-primary">Girar</button>
                                </div>
                                <div class="card border-l-4 border-purple-500">
                                    <h3 class="text-xl font-bold mb-4">🃏 Blackjack</h3>
                                    <p class="text-sm text-slate-400 mb-4">Gana (x1.5) si tu mano es mejor</p>
                                    <input type="number" id="blackjack-bet" placeholder="Apuesta" min="1" class="w-full px-3 py-2 bg-slate-800 border border-slate-700 rounded-lg text-white mb-2">
                                    <button onclick="playGame('blackjack')" class="w-full btn-primary">Jugar</button>
                                </div>
                                <div class="card border-l-4 border-yellow-500">
                                    <h3 class="text-xl font-bold mb-4">🪙 Coin Flip</h3>
                                    <p class="text-sm text-slate-400 mb-4">50% de probabilidad de ganar (x1)</p>
                                    <input type="number" id="coinflip-bet" placeholder="Apuesta" min="1" class="w-full px-3 py-2 bg-slate-800 border border-slate-700 rounded-lg text-white mb-2">
                                    <button onclick="playGame('coinflip')" class="w-full btn-primary">Lanzar</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            } else if (page === 'shop') {
                app.innerHTML = `
                    <div class="min-h-screen bg-gradient-to-br from-slate-950 to-yellow-950 p-4">
                        <div class="max-w-7xl mx-auto">
                            <button onclick="page='dashboard'; render()" class="mb-4 px-4 py-2 bg-slate-700 rounded-lg text-sm">← Atrás</button>
                            <h2 class="text-3xl font-bold gradient-text mb-6">💎 Tienda de Lujos</h2>

                            ${Object.entries(LUXURY_CATEGORIES).map(([category, items]) => `
                                <div class="mb-8">
                                    <h3 class="text-2xl font-bold mb-4">${category}</h3>
                                    <div class="luxury-grid">
                                        ${items.map(item => {
                                            const owned = user.luxuryItems.some(l => l.id === item.id);
                                            return `
                                                <div class="luxury-item ${owned ? 'owned' : ''}">
                                                    <p class="text-4xl mb-2">${item.icon}</p>
                                                    <h4 class="font-bold text-sm mb-1">${item.name}</h4>
                                                    <p class="text-price-badge mb-3">$${item.price.toLocaleString()}</p>
                                                    <button onclick="buyLuxury('${item.id}')" class="w-full btn-primary text-xs py-2">${owned ? '✓ Poseído' : 'Comprar'}</button>
                                                </div>
                                            `;
                                        }).join('')}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            } else if (page === 'leaderboard') {
                app.innerHTML = `
                    <div class="min-h-screen bg-gradient-to-br from-slate-950 to-purple-950 p-4">
                        <div class="max-w-4xl mx-auto">
                            <button onclick="page='dashboard'; render()" class="mb-4 px-4 py-2 bg-slate-700 rounded-lg text-sm">← Atrás</button>
                            <h2 class="text-3xl font-bold gradient-text mb-6">🏆 Leaderboard Global</h2>
                            <div class="card">
                                ${leaderboard.map((u, i) => `
                                    <div class="leaderboard-row ${i === 0 ? 'border-l-4 border-yellow-400' : ''}">
                                        <div class="flex items-center gap-4">
                                            <p class="text-2xl font-bold w-8">🥇🥈🥉'[i < 3 ? '🥇🥈🥉'[i] : i + 1}</p>
                                            <div>
                                                <p class="font-bold">${u.username}</p>
                                                <p class="text-xs text-slate-400">Nivel ${u.level} • ${u.rank} • ${u.luxuryCount} items</p>
                                            </div>
                                        </div>
                                        <p class="text-xl font-bold text-green-400">$${u.balance.toLocaleString()}</p>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                `;
            }
        }

        render();
    </script>
</body>
</html>
