<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💰 Trading Casino - Dinero Ficticio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overflow-x: hidden; }
        .animate-spin { animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-900 text-white">
    <div id="app"></div>
    <script>
        const DB = {
            getUser: () => JSON.parse(localStorage.getItem('user')) || null,
            setUser: (u) => localStorage.setItem('user', JSON.stringify(u)),
            getTrades: (id) => JSON.parse(localStorage.getItem(`trades_${id}`)) || [],
            setTrades: (id, t) => localStorage.setItem(`trades_${id}`, JSON.stringify(t)),
            getGames: (id) => JSON.parse(localStorage.getItem(`games_${id}`)) || [],
            setGames: (id, g) => localStorage.setItem(`games_${id}`, JSON.stringify(g))
        };

        let user = DB.getUser();
        let page = 'login';

        const Prices = {
            BTC: () => 67000 + (Math.random()-0.5)*5000,
            ETH: () => 3500 + (Math.random()-0.5)*500,
            GOLD: () => 2400 + (Math.random()-0.5)*100,
            APPLE: () => 230 + (Math.random()-0.5)*20,
            TESLA: () => 250 + (Math.random()-0.5)*30,
            SHIBA: () => 0.000015 + (Math.random()-0.5)*0.000005
        };

        const Luxury = [
            {id: 'lambo', name: 'Lamborghini', price: 50000, emoji: '🏎️'},
            {id: 'ferrari', name: 'Ferrari', price: 80000, emoji: '🏎️'},
            {id: 'bugatti', name: 'Bugatti', price: 150000, emoji: '🏎️'},
            {id: 'rolex', name: 'Rolex', price: 15000, emoji: '⌚'},
            {id: 'richard', name: 'Richard Mille', price: 100000, emoji: '⌚'},
            {id: 'patek', name: 'Patek Philippe', price: 50000, emoji: '⌚'},
            {id: 'yacht', name: 'Yacht', price: 500000, emoji: '⛵'},
            {id: 'villa', name: 'Villa Maldivas', price: 300000, emoji: '🏠'},
            {id: 'penthouse', name: 'Penthouse', price: 200000, emoji: '🏢'}
        ];

        function login() {
            const username = document.getElementById('username').value;
            if (!username) return alert('Nombre requerido');
            user = {id: Date.now(), username, balance: 10000, luxuryItems: [], createdAt: new Date()};
            DB.setUser(user);
            page = 'dashboard';
            render();
        }

        function buyAsset() {
            const asset = document.getElementById('asset').value;
            const amount = parseFloat(document.getElementById('amount').value);
            if (!asset || !amount) return alert('Datos requeridos');

            const price = Prices[asset]();
            const cost = price * amount;
            if (user.balance < cost) return alert('Saldo insuficiente');

            user.balance -= cost;
            const trades = DB.getTrades(user.id);
            trades.push({id: Date.now(), type: 'BUY', asset, amount, price, cost, profit: 0});
            DB.setTrades(user.id, trades);
            DB.setUser(user);
            alert(`✅ Comprado ${amount} ${asset} por $${cost.toFixed(2)}`);
            document.getElementById('asset').value = '';
            document.getElementById('amount').value = '';
            render();
        }

        function playRoulette() {
            const bet = parseFloat(document.getElementById('rouletteBet').value);
            if (!bet || user.balance < bet) return alert('Apuesta válida requerida');

            const won = Math.random() > 0.5;
            user.balance += won ? bet : -bet;

            const games = DB.getGames(user.id);
            games.push({game: 'ROULETTE', bet, result: won ? 'WIN' : 'LOSS'});
            DB.setGames(user.id, games);
            DB.setUser(user);

            alert(won ? `🎉 ¡GANASTE! +$${bet}` : `😢 Perdiste -$${bet}`);
            document.getElementById('rouletteBet').value = '';
            render();
        }

        function playBlackjack() {
            const bet = parseFloat(document.getElementById('blackjackBet').value);
            if (!bet || user.balance < bet) return alert('Apuesta válida');

            const won = Math.random() > 0.5;
            user.balance += won ? bet * 1.5 : -bet;

            const games = DB.getGames(user.id);
            games.push({game: 'BLACKJACK', bet, result: won ? 'WIN' : 'LOSS'});
            DB.setGames(user.id, games);
            DB.setUser(user);

            alert(won ? `🎉 ¡GANASTE! +$${(bet*1.5).toFixed(2)}` : `😢 Perdiste -$${bet}`);
            document.getElementById('blackjackBet').value = '';
            render();
        }

        function playCoinflip() {
            const bet = parseFloat(document.getElementById('coinBet').value);
            if (!bet || user.balance < bet) return alert('Apuesta válida');

            const won = Math.random() > 0.5;
            user.balance += won ? bet : -bet;

            const games = DB.getGames(user.id);
            games.push({game: 'COINFLIP', bet, result: won ? 'WIN' : 'LOSS'});
            DB.setGames(user.id, games);
            DB.setUser(user);

            alert(won ? `🎉 ${won ? 'HEADS' : 'TAILS'}! +$${bet}` : `😢 ${won ? 'HEADS' : 'TAILS'}... -$${bet}`);
            document.getElementById('coinBet').value = '';
            render();
        }

        function buyLuxury(itemId, price, name) {
            if (user.balance < price) return alert('Saldo insuficiente');
            user.balance -= price;
            user.luxuryItems.push({itemId, name, price});
            DB.setUser(user);
            alert(`🏎️ ¡Compraste ${name}! Saldo: $${user.balance.toFixed(2)}`);
            render();
        }

        function render() {
            const app = document.getElementById('app');

            if (!user) {
                app.innerHTML = `
                    <div class="min-h-screen bg-gradient-to-br from-blue-900 to-purple-900 flex items-center justify-center p-4">
                        <div class="bg-gray-800 rounded-2xl p-8 max-w-md w-full shadow-2xl">
                            <h1 class="text-4xl font-bold text-center mb-2">💰 Trading Casino</h1>
                            <p class="text-gray-400 text-center mb-6">Dinero Ficticio - Competencia Real</p>
                            <input type="text" id="username" placeholder="Tu nombre" class="w-full px-4 py-3 bg-gray-700 rounded-lg mb-4 text-white placeholder-gray-400">
                            <button onclick="login()" class="w-full bg-blue-600 hover:bg-blue-700 py-3 rounded-lg font-bold">Entrar</button>
                        </div>
                    </div>
                `;
                return;
            }

            const pages = {
                dashboard: `
                    <div class="min-h-screen bg-gray-900 p-4">
                        <div class="max-w-4xl mx-auto">
                            <div class="bg-gradient-to-r from-blue-600 to-purple-600 rounded-lg p-6 mb-6">
                                <h1 class="text-3xl font-bold">¡Hola ${user.username}! 👋</h1>
                                <p class="text-xl mt-2">💰 Saldo: $${user.balance.toFixed(2)}</p>
                                <p class="text-sm mt-1">Lujos: ${user.luxuryItems.length}</p>
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                                <button onclick="page='trading'; render()" class="bg-green-600 hover:bg-green-700 p-6 rounded-lg font-bold text-lg">📈 Trading</button>
                                <button onclick="page='casino'; render()" class="bg-red-600 hover:bg-red-700 p-6 rounded-lg font-bold text-lg">🎰 Casino</button>
                                <button onclick="page='luxury'; render()" class="bg-yellow-600 hover:bg-yellow-700 p-6 rounded-lg font-bold text-lg">🏎️ Lujos</button>
                            </div>
                        </div>
                    </div>
                `,
                trading: `
                    <div class="min-h-screen bg-gray-900 p-4">
                        <div class="max-w-2xl mx-auto">
                            <button onclick="page='dashboard'; render()" class="mb-4 bg-gray-700 px-4 py-2 rounded">← Atrás</button>
                            <div class="bg-gray-800 rounded-lg p-6">
                                <h2 class="text-2xl font-bold mb-4">📈 Trading</h2>
                                <select id="asset" class="w-full px-4 py-2 bg-gray-700 rounded mb-4 text-white">
                                    <option value="">Elige activo</option>
                                    <option value="BTC">Bitcoin</option>
                                    <option value="ETH">Ethereum</option>
                                    <option value="GOLD">Oro</option>
                                    <option value="APPLE">Apple</option>
                                    <option value="TESLA">Tesla</option>
                                </select>
                                <input type="number" id="amount" placeholder="Cantidad" class="w-full px-4 py-2 bg-gray-700 rounded mb-4 text-white placeholder-gray-400" step="0.01">
                                <button onclick="buyAsset()" class="w-full bg-green-600 hover:bg-green-700 py-2 rounded font-bold">Comprar</button>
                            </div>
                        </div>
                    </div>
                `,
                casino: `
                    <div class="min-h-screen bg-gray-900 p-4">
                        <div class="max-w-2xl mx-auto">
                            <button onclick="page='dashboard'; render()" class="mb-4 bg-gray-700 px-4 py-2 rounded">← Atrás</button>
                            <h2 class="text-2xl font-bold mb-4">🎰 Casino</h2>
                            <div class="bg-gray-800 rounded-lg p-4 mb-4">
                                <h3 class="font-bold mb-2">🎡 Ruleta</h3>
                                <input type="number" id="rouletteBet" placeholder="Apuesta" class="w-full px-4 py-2 bg-gray-700 rounded mb-2 text-white placeholder-gray-400">
                                <button onclick="playRoulette()" class="w-full bg-red-600 hover:bg-red-700 py-2 rounded font-bold">Girar</button>
                            </div>
                            <div class="bg-gray-800 rounded-lg p-4 mb-4">
                                <h3 class="font-bold mb-2">🃏 Blackjack</h3>
                                <input type="number" id="blackjackBet" placeholder="Apuesta" class="w-full px-4 py-2 bg-gray-700 rounded mb-2 text-white placeholder-gray-400">
                                <button onclick="playBlackjack()" class="w-full bg-purple-600 hover:bg-purple-700 py-2 rounded font-bold">Jugar</button>
                            </div>
                            <div class="bg-gray-800 rounded-lg p-4">
                                <h3 class="font-bold mb-2">🪙 Coin Flip</h3>
                                <input type="number" id="coinBet" placeholder="Apuesta" class="w-full px-4 py-2 bg-gray-700 rounded mb-2 text-white placeholder-gray-400">
                                <button onclick="playCoinflip()" class="w-full bg-yellow-600 hover:bg-yellow-700 py-2 rounded font-bold">Lanzar</button>
                            </div>
                        </div>
                    </div>
                `,
                luxury: `
                    <div class="min-h-screen bg-gray-900 p-4">
                        <div class="max-w-4xl mx-auto">
                            <button onclick="page='dashboard'; render()" class="mb-4 bg-gray-700 px-4 py-2 rounded">← Atrás</button>
                            <h2 class="text-2xl font-bold mb-4">🏎️ Tienda de Lujos</h2>
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                                ${Luxury.map(item => `
                                    <div class="bg-gray-800 rounded-lg p-4">
                                        <h3>${item.emoji} ${item.name}</h3>
                                        <p class="text-yellow-400 font-bold">$${item.price.toLocaleString()}</p>
                                        <button onclick="buyLuxury('${item.id}', ${item.price}, '${item.name}')" class="w-full bg-blue-600 hover:bg-blue-700 mt-2 py-1 rounded text-sm">Comprar</button>
                                    </div>
                                `).join('')}
                            </div>
                            <div class="mt-6 bg-gray-800 rounded-lg p-4">
                                <h3 class="font-bold mb-2">Tus Lujos:</h3>
                                <p>${user.luxuryItems.length === 0 ? 'Sin lujos aún' : user.luxuryItems.map(i => `${Luxury.find(l => l.id === i.itemId)?.emoji} ${i.name}`).join(', ')}</p>
                            </div>
                        </div>
                    </div>
                `
            };

            app.innerHTML = pages[page] || pages.dashboard;
        }

        render();
    </script>
</body>
</html>
