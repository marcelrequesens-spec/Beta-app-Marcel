<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Trading - Professional Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts@3.45.0/dist/apexcharts.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Sora:wght@600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        h1, h2, h3, h4, h5, h6 { font-family: 'Sora', sans-serif; font-weight: 700; }

        :root {
            --primary: #6366f1;
            --secondary: #0ea5e9;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --dark: #0f172a;
            --card: #1a2f4f;
            --border: #2d4a7b;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1a1f3a 100%);
            color: #f1f5f9;
            overflow-x: hidden;
        }

        .glass {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(100, 150, 200, 0.2);
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 0.875rem 1.75rem;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 35px rgba(99, 102, 241, 0.4);
        }

        .gradient-text {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .chart-container {
            background: var(--card);
            border-radius: 12px;
            padding: 1.5rem;
            border: 1px solid var(--border);
            height: 350px;
            margin-top: 1rem;
        }

        .blackjack-table {
            background: linear-gradient(135deg, #065f46 0%, #047857 100%);
            border-radius: 20px;
            padding: 2rem;
            min-height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card-display {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin: 1rem 0;
        }

        .playing-card {
            width: 80px;
            height: 120px;
            background: white;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.5rem;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            animation: cardFlip 0.6s ease;
        }

        @keyframes cardFlip {
            0% { transform: rotateY(90deg); }
            100% { transform: rotateY(0deg); }
        }

        .table-hand {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            padding: 1.5rem;
            backdrop-filter: blur(10px);
        }

        .chips {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .chip {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .chip:hover {
            transform: scale(1.1);
        }

        .chip-100 { background: linear-gradient(135deg, #f59e0b, #d97706); color: white; }
        .chip-50 { background: linear-gradient(135deg, #ec4899, #be185d); color: white; }
        .chip-25 { background: linear-gradient(135deg, #06b6d4, #0891b2); color: white; }
        .chip-10 { background: linear-gradient(135deg, #8b5cf6, #6d28d9); color: white; }

        .stat-card {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(14, 165, 233, 0.1));
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 12px;
            padding: 1.5rem;
        }

        .league-leaderboard {
            background: var(--card);
            border-radius: 12px;
            overflow: hidden;
        }

        .leaderboard-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            transition: background 0.2s;
        }

        .leaderboard-row:hover {
            background: rgba(99, 102, 241, 0.1);
        }

        .leaderboard-row:first-child {
            background: linear-gradient(135deg, rgba(251, 191, 36, 0.2), transparent);
            border-bottom: 2px solid #fbbf24;
        }

        .rank-badge {
            background: var(--primary);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 1rem;
        }

        .investment-item {
            background: var(--card);
            border-left: 4px solid var(--primary);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1rem;
        }

        .nav-item {
            padding: 0.875rem 1.25rem;
            cursor: pointer;
            transition: all 0.3s;
            border-left: 3px solid transparent;
            font-weight: 500;
        }

        .nav-item.active {
            border-left-color: var(--primary);
            background: rgba(99, 102, 241, 0.1);
        }

        .tab-button {
            padding: 0.75rem 1.5rem;
            background: none;
            border: none;
            color: #cbd5e1;
            cursor: pointer;
            font-weight: 500;
            border-bottom: 2px solid transparent;
            transition: all 0.3s;
        }

        .tab-button.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }
    </style>
</head>
<body>
    <div class="min-h-screen flex">
        <div class="w-64 bg-gradient-to-b from-[#0f172a] to-[#1a1f3a] border-r border-[#2d4a7b] p-6 overflow-y-auto">
            <h1 class="text-2xl font-bold gradient-text mb-8">Elite</h1>
            <nav id="sidebar" class="space-y-2"></nav>
        </div>

        <div class="flex-1 overflow-auto">
            <div id="content" class="p-8"></div>
        </div>
    </div>

    <script>
        const state = {
            user: null,
            page: 'login',
            portfolio: [],
            groups: [],
            investments: [],
            gameState: { blackjackCards: [], dealerCards: [], playerTotal: 0, dealerTotal: 0 }
        };

        const DB = {
            getUser: () => JSON.parse(localStorage.getItem('user')) || null,
            setUser: (u) => localStorage.setItem('user', JSON.stringify(u)),
            getGroups: () => JSON.parse(localStorage.getItem('groups')) || [],
            setGroups: (g) => localStorage.setItem('groups', JSON.stringify(g))
        };

        const MARKETS = {
            crypto: [
                { symbol: 'BTC', name: 'Bitcoin', price: 67500, change: 2.5, high: 69000, low: 66000, volume: '28.5B', description: 'Criptomoneda descentralizada, primera blockchain del mundo', volatility: 'Alta' },
                { symbol: 'ETH', name: 'Ethereum', price: 3580, change: 1.8, high: 3650, low: 3450, volume: '15.2B', description: 'Plataforma de contratos inteligentes', volatility: 'Alta' },
                { symbol: 'SOL', name: 'Solana', price: 215, change: 3.2, high: 220, low: 200, volume: '2.1B', description: 'Blockchain de alta velocidad', volatility: 'Muy Alta' }
            ],
            stocks: [
                { symbol: 'AAPL', name: 'Apple Inc.', price: 230, change: 1.2, high: 235, low: 225, volume: '52.3M', description: 'Empresa tecnológica líder', volatility: 'Media' },
                { symbol: 'TSLA', name: 'Tesla Inc.', price: 252, change: 2.8, high: 260, low: 245, volume: '125.4M', description: 'Vehículos eléctricos e innovación', volatility: 'Alta' },
                { symbol: 'MSFT', name: 'Microsoft', price: 425, change: 2.1, high: 430, low: 415, volume: '18.9M', description: 'Software y servicios en la nube', volatility: 'Media' }
            ]
        };

        function renderSidebar() {
            const sidebar = document.getElementById('sidebar');
            const items = [
                { id: 'dashboard', label: 'Dashboard' },
                { id: 'trading', label: 'Trading' },
                { id: 'casino', label: 'Casino' },
                { id: 'groups', label: 'Ligas' },
                { id: 'education', label: 'Educación' },
                { id: 'logout', label: 'Salir' }
            ];

            sidebar.innerHTML = items.map(item => `
                <div class="nav-item ${state.page === item.id ? 'active' : ''}" onclick="navigate('${item.id}')">
                    ${item.label}
                </div>
            `).join('');
        }

        function navigate(page) {
            if (page === 'logout') {
                localStorage.clear();
                state.user = null;
                state.page = 'login';
            } else {
                state.page = page;
            }
            render();
        }

        function handleLogin() {
            const username = document.getElementById('username')?.value;
            if (!username) return alert('Nombre requerido');

            state.user = {
                id: Date.now(),
                username,
                balance: 100000,
                totalWon: 0,
                totalLost: 0,
                level: 1,
                groups: []
            };

            DB.setUser(state.user);
            state.page = 'dashboard';
            render();
        }

        function updateChart(chartId, data) {
            const options = {
                chart: { type: 'line', sparkline: { enabled: false }, toolbar: { show: false } },
                colors: ['#6366f1'],
                stroke: { curve: 'smooth', width: 2 },
                xaxis: { type: 'datetime', labels: { show: false } },
                yaxis: { labels: { show: false } },
                grid: { show: false },
                tooltip: { enabled: true }
            };

            const chart = new ApexCharts(document.getElementById(chartId), { ...options, series: [{ data: data }] });
            chart.render();
        }

        function playBlackjack() {
            const bet = parseFloat(document.getElementById('blackjack-bet')?.value || 0);
            if (bet <= 0 || bet > state.user.balance) return alert('Apuesta inválida');

            state.user.balance -= bet;
            const playerCards = [Math.floor(Math.random() * 10) + 5, Math.floor(Math.random() * 10) + 5];
            const dealerCards = [Math.floor(Math.random() * 10) + 5, Math.floor(Math.random() * 10) + 5];
            const playerTotal = Math.min(playerCards.reduce((a, b) => a + b), 21);
            const dealerTotal = Math.min(dealerCards.reduce((a, b) => a + b), 21);

            const won = playerTotal > dealerTotal && playerTotal <= 21;
            if (won) {
                state.user.balance += bet * 2.5;
                state.user.totalWon += bet * 2.5;
            } else {
                state.user.totalLost += bet;
            }

            DB.setUser(state.user);
            alert(`${won ? '🎉 ¡GANASTE!' : '😢 Perdiste'}\nTú: ${playerTotal} | Dealer: ${dealerTotal}`);
            document.getElementById('blackjack-bet').value = '';
            render();
        }

        function buyAsset(symbol) {
            const amount = parseFloat(document.getElementById(`amount-${symbol}`)?.value || 0);
            if (amount <= 0) return alert('Cantidad inválida');

            const asset = [...MARKETS.crypto, ...MARKETS.stocks].find(a => a.symbol === symbol);
            if (!asset) return;

            const cost = asset.price * amount;
            if (state.user.balance < cost) return alert(`Saldo insuficiente. Necesitas $${cost.toFixed(2)}`);

            state.user.balance -= cost;
            state.investments.push({
                symbol, name: asset.name, amount, buyPrice: asset.price,
                currentPrice: asset.price, date: new Date()
            });

            DB.setUser(state.user);
            alert(`✅ Invertiste $${cost.toFixed(2)} en ${symbol}`);
            document.getElementById(`amount-${symbol}`).value = '';
            render();
        }

        function createGroup() {
            const name = prompt('Nombre de la liga:');
            if (!name) return;

            const group = {
                id: Date.now(), name, creator: state.user.username,
                members: [{ username: state.user.username, balance: state.user.balance }],
                createdAt: new Date()
            };

            state.groups.push(group);
            DB.setGroups(state.groups);
            render();
        }

        function joinGroup(groupId) {
            const group = state.groups.find(g => g.id === groupId);
            if (!group || group.members.some(m => m.username === state.user.username)) return alert('Ya eres miembro');

            group.members.push({ username: state.user.username, balance: state.user.balance });
            DB.setGroups(state.groups);
            render();
        }

        function render() {
            const content = document.getElementById('content');

            if (!state.user) {
                content.innerHTML = `
                    <div class="min-h-screen flex items-center justify-center">
                        <div class="w-full max-w-md">
                            <div class="glass rounded-2xl p-8">
                                <h1 class="text-4xl font-bold gradient-text mb-2">Elite Trading</h1>
                                <p class="text-center text-gray-400 mb-8">Plataforma profesional de inversión y trading</p>
                                <div class="space-y-4">
                                    <input type="text" id="username" placeholder="Tu nombre" class="w-full px-4 py-3 bg-slate-800 border border-[#2d4a7b] rounded-lg text-white focus:outline-none focus:border-[#6366f1]">
                                    <button onclick="handleLogin()" class="w-full btn-primary">Comenzar</button>
                                </div>
                                <p class="text-center text-gray-500 text-sm mt-6">Comienza con $100,000 de capital ficticio</p>
                            </div>
                        </div>
                    </div>
                `;
                return;
            }

            renderSidebar();

            if (state.page === 'dashboard') {
                const investedTotal = state.investments.reduce((sum, inv) => sum + (inv.amount * inv.buyPrice), 0);
                content.innerHTML = `
                    <div>
                        <h1 class="text-4xl font-bold mb-8">Bienvenido, ${state.user.username}</h1>
                        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
                            <div class="stat-card"><p class="text-gray-400 text-sm mb-2">Saldo</p><p class="text-3xl font-bold">$${state.user.balance.toLocaleString('en-US', {maximumFractionDigits: 0})}</p></div>
                            <div class="stat-card"><p class="text-gray-400 text-sm mb-2">Invertido</p><p class="text-3xl font-bold">$${investedTotal.toLocaleString('en-US', {maximumFractionDigits: 0})}</p></div>
                            <div class="stat-card"><p class="text-gray-400 text-sm mb-2">Inversiones</p><p class="text-3xl font-bold">${state.investments.length}</p></div>
                            <div class="stat-card"><p class="text-gray-400 text-sm mb-2">Ligas</p><p class="text-3xl font-bold">${state.user.groups.length}</p></div>
                        </div>
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                            <button onclick="navigate('trading')" class="card text-center py-4 hover:border-[#6366f1]"><p class="text-xl">📈</p><p class="mt-2 font-semibold">Trading</p></button>
                            <button onclick="navigate('casino')" class="card text-center py-4 hover:border-[#6366f1]"><p class="text-xl">🎰</p><p class="mt-2 font-semibold">Casino</p></button>
                            <button onclick="navigate('groups')" class="card text-center py-4 hover:border-[#6366f1]"><p class="text-xl">👥</p><p class="mt-2 font-semibold">Ligas</p></button>
                            <button onclick="navigate('education')" class="card text-center py-4 hover:border-[#6366f1]"><p class="text-xl">📚</p><p class="mt-2 font-semibold">Educación</p></button>
                        </div>
                    </div>
                `;
            } else if (state.page === 'trading') {
                content.innerHTML = `
                    <div>
                        <h1 class="text-4xl font-bold mb-8">Trading</h1>
                        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
                            <div class="lg:col-span-2">
                                <div class="card">
                                    <h2 class="text-2xl font-bold mb-6">Mercados</h2>
                                    <div class="space-y-4">
                                        ${[...MARKETS.crypto, ...MARKETS.stocks].map(asset => `
                                            <div class="investment-item">
                                                <div class="flex justify-between mb-3">
                                                    <div>
                                                        <h3 class="font-bold text-lg">${asset.symbol}</h3>
                                                        <p class="text-sm text-gray-400">${asset.name}</p>
                                                        <p class="text-xs text-gray-500 mt-1">${asset.description}</p>
                                                    </div>
                                                    <div class="text-right">
                                                        <p class="text-2xl font-bold">$${asset.price.toFixed(2)}</p>
                                                        <p class="text-sm ${asset.change > 0 ? 'text-green-400' : 'text-red-400'}">${asset.change > 0 ? '+' : ''}${asset.change}%</p>
                                                        <p class="text-xs text-gray-500 mt-1">Volatilidad: ${asset.volatility}</p>
                                                    </div>
                                                </div>
                                                <div class="grid grid-cols-2 gap-4 mb-4 text-xs text-gray-400">
                                                    <div><p>Máx: $${asset.high}</p><p>Mín: $${asset.low}</p></div>
                                                    <div><p>Vol: ${asset.volume}</p></div>
                                                </div>
                                                <div class="flex gap-2">
                                                    <input type="number" id="amount-${asset.symbol}" placeholder="Cantidad" step="0.001" class="flex-1 px-3 py-2 bg-slate-800 border border-[#2d4a7b] rounded-lg text-white text-sm">
                                                    <button onclick="buyAsset('${asset.symbol}')" class="btn-primary px-4 py-2 text-sm">Invertir</button>
                                                </div>
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                            </div>
                            <div class="card">
                                <h2 class="text-xl font-bold mb-4">¿Cómo funciona?</h2>
                                <ol class="space-y-3 text-sm text-gray-300">
                                    <li><strong class="text-white">1. Elige activo:</strong> Bitcoin, Ethereum, Acciones</li>
                                    <li><strong class="text-white">2. Ingresa cantidad:</strong> Cuánto dinero invertir</li>
                                    <li><strong class="text-white">3. El precio fluctúa:</strong> Sube y baja continuamente</li>
                                    <li><strong class="text-white">4. Vende para ganar:</strong> Realiza ganancias/pérdidas</li>
                                </ol>
                            </div>
                        </div>
                        ${state.investments.length > 0 ? `
                            <div class="card">
                                <h2 class="text-2xl font-bold mb-4">Mis Inversiones</h2>
                                ${state.investments.map((inv, i) => {
                                    const profit = (inv.currentPrice - inv.buyPrice) * inv.amount;
                                    return `
                                        <div class="investment-item">
                                            <div class="flex justify-between">
                                                <div><p class="font-bold">${inv.symbol} - ${inv.name}</p><p class="text-sm text-gray-400">${inv.amount} @ $${inv.buyPrice.toFixed(2)}</p></div>
                                                <div class="text-right"><p class="font-bold">$${(inv.amount * inv.currentPrice).toFixed(2)}</p><p class="text-sm ${profit >= 0 ? 'text-green-400' : 'text-red-400'}">${profit >= 0 ? '+' : ''}$${profit.toFixed(2)}</p></div>
                                            </div>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        ` : ''}
                    </div>
                `;
            } else if (state.page === 'casino') {
                content.innerHTML = `
                    <div>
                        <h1 class="text-4xl font-bold mb-8">Casino Profesional</h1>
                        <div class="card">
                            <h2 class="text-2xl font-bold mb-6">Blackjack</h2>
                            <div class="blackjack-table">
                                <div class="table-hand">
                                    <p class="text-sm text-gray-300 mb-2">Mano del Dealer</p>
                                    <div class="card-display">
                                        <div class="playing-card">K</div>
                                        <div class="playing-card" style="opacity: 0.3;">?</div>
                                    </div>
                                </div>
                                <div class="table-hand">
                                    <p class="text-sm text-gray-300 mb-2">Tu Mano</p>
                                    <div class="card-display">
                                        <div class="playing-card">10</div>
                                        <div class="playing-card">9</div>
                                    </div>
                                    <p class="text-center font-bold text-lg mt-2">Total: 19</p>
                                </div>
                                <div>
                                    <p class="text-sm text-gray-300 mb-3">Apuesta tu dinero:</p>
                                    <div class="chips">
                                        <div class="chip chip-10" onclick="document.getElementById('blackjack-bet').value='10'">$10</div>
                                        <div class="chip chip-25" onclick="document.getElementById('blackjack-bet').value='25'">$25</div>
                                        <div class="chip chip-50" onclick="document.getElementById('blackjack-bet').value='50'">$50</div>
                                        <div class="chip chip-100" onclick="document.getElementById('blackjack-bet').value='100'">$100</div>
                                    </div>
                                </div>
                            </div>
                            <div class="mt-6">
                                <input type="number" id="blackjack-bet" placeholder="Apuesta" min="1" max="${state.user.balance}" class="w-full px-4 py-2 bg-slate-800 border border-[#2d4a7b] rounded-lg text-white mb-4">
                                <button onclick="playBlackjack()" class="w-full btn-primary py-3">Jugar Blackjack</button>
                            </div>
                        </div>
                    </div>
                `;
            } else if (state.page === 'groups') {
                state.groups = DB.getGroups();
                content.innerHTML = `
                    <div>
                        <div class="flex justify-between items-center mb-8">
                            <h1 class="text-4xl font-bold">Ligas de Competencia</h1>
                            <button onclick="createGroup()" class="btn-primary">+ Nueva Liga</button>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            ${state.groups.map(group => `
                                <div class="card">
                                    <h3 class="text-xl font-bold mb-2">${group.name}</h3>
                                    <p class="text-sm text-gray-400 mb-4">Creada por ${group.creator}</p>
                                    <div class="league-leaderboard mb-4">
                                        ${group.members
                                            .sort((a, b) => b.balance - a.balance)
                                            .map((member, i) => `
                                            <div class="leaderboard-row">
                                                <div class="flex items-center flex-1">
                                                    <div class="rank-badge">${i + 1}</div>
                                                    <span class="font-semibold">${member.username}</span>
                                                </div>
                                                <span class="text-green-400 font-bold">$${member.balance.toLocaleString('en-US', {maximumFractionDigits: 0})}</span>
                                            </div>
                                        `).join('')}
                                    </div>
                                    ${!group.members.some(m => m.username === state.user.username) ? `
                                        <button onclick="joinGroup(${group.id})" class="w-full btn-primary py-2">Unirse a Liga</button>
                                    ` : `<p class="text-center text-green-400 font-semibold">✅ Eres miembro</p>`}
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            } else if (state.page === 'education') {
                content.innerHTML = `
                    <div>
                        <h1 class="text-4xl font-bold mb-8">Centro Educativo</h1>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="card">
                                <h2 class="text-xl font-bold mb-4">Bitcoin (BTC)</h2>
                                <p class="text-gray-300 mb-4">Primera criptomoneda del mundo, creada en 2009. Funciona de forma descentralizada sin intermediarios.</p>
