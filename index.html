<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Trading - Plataforma Profesional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts@3.45.0/dist/apexcharts.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Sora:wght@600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        h1, h2, h3, h4 { font-family: 'Sora', sans-serif; }
        body { background: linear-gradient(135deg, #0f172a 0%, #1a1f3a 100%); color: #f1f5f9; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(100, 150, 200, 0.2); }
        .card { background: #1a2f4f; border: 1px solid #2d4a7b; border-radius: 16px; padding: 1.5rem; transition: all 0.3s; }
        .card:hover { border-color: #6366f1; transform: translateY(-2px); }
        .btn-primary { background: linear-gradient(135deg, #6366f1, #0ea5e9); color: white; border: none; padding: 0.875rem 1.75rem; border-radius: 10px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 35px rgba(99, 102, 241, 0.4); }
        .gradient-text { background: linear-gradient(135deg, #6366f1, #0ea5e9); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .stat-card { background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(14, 165, 233, 0.1)); border: 1px solid rgba(99, 102, 241, 0.3); border-radius: 12px; padding: 1.5rem; }
        .chart { height: 350px; margin-top: 1rem; }
        .roulette { width: 300px; height: 300px; border-radius: 50%; background: conic-gradient(red 0deg 18deg, black 18deg 36deg, red 36deg 54deg, black 54deg 72deg, red 72deg 90deg, black 90deg 108deg, red 108deg 126deg, black 126deg 144deg, red 144deg 162deg, black 162deg 180deg, red 180deg 198deg, black 198deg 216deg, red 216deg 234deg, black 234deg 252deg, red 252deg 270deg, black 270deg 288deg, red 288deg 306deg, black 306deg 324deg, red 324deg 342deg, black 342deg 360deg); margin: 0 auto; box-shadow: 0 10px 40px rgba(99, 102, 241, 0.3); position: relative; }
        .ball { width: 20px; height: 20px; background: #fbbf24; border-radius: 50%; position: absolute; top: 15px; left: 50%; transform: translateX(-50%); }
        .spinning { animation: spin 3s linear forwards; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .nav-item { padding: 0.875rem 1.25rem; cursor: pointer; transition: all 0.3s; border-left: 3px solid transparent; }
        .nav-item.active { border-left-color: #6366f1; background: rgba(99, 102, 241, 0.1); }
        .investment-item { background: #1a2f4f; border-left: 4px solid #6366f1; border-radius: 8px; padding: 1.5rem; margin-bottom: 1rem; }
        .league-row { display: flex; justify-content: space-between; align-items: center; padding: 1rem 1.5rem; border-bottom: 1px solid #2d4a7b; }
        .league-row:first-child { background: linear-gradient(135deg, rgba(251, 191, 36, 0.2), transparent); }
        .rank { width: 40px; height: 40px; background: #6366f1; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; margin-right: 1rem; }
    </style>
</head>
<body>
    <div class="min-h-screen flex">
        <div class="w-64 bg-gradient-to-b from-[#0f172a] to-[#1a1f3a] border-r border-[#2d4a7b] p-6 overflow-y-auto">
            <h1 class="text-2xl font-bold gradient-text mb-8">ELITE</h1>
            <nav id="sidebar" class="space-y-2"></nav>
        </div>
        <div class="flex-1 overflow-auto"><div id="content" class="p-8"></div></div>
    </div>

    <script>
        const state = {
            user: null,
            page: 'login',
            investments: [],
            groups: [],
            transactions: [],
            rouletteSpinning: false
        };

        const DB = {
            getUser: () => JSON.parse(localStorage.getItem('user')) || null,
            setUser: (u) => localStorage.setItem('user', JSON.stringify(u)),
            getInvestments: (id) => JSON.parse(localStorage.getItem(`inv_${id}`)) || [],
            setInvestments: (id, inv) => localStorage.setItem(`inv_${id}`, JSON.stringify(inv)),
            getGroups: () => JSON.parse(localStorage.getItem('groups')) || [],
            setGroups: (g) => localStorage.setItem('groups', JSON.stringify(g)),
            getTransactions: (id) => JSON.parse(localStorage.getItem(`trans_${id}`)) || [],
            setTransactions: (id, t) => localStorage.setItem(`trans_${id}`, JSON.stringify(t))
        };

        const MARKETS = {
            crypto: [
                { symbol: 'BTC', name: 'Bitcoin', base: 67500, vol: 8000, desc: 'Criptomoneda descentralizada, primera blockchain del mundo' },
                { symbol: 'ETH', name: 'Ethereum', base: 3580, vol: 500, desc: 'Plataforma de contratos inteligentes y dApps' },
                { symbol: 'SOL', name: 'Solana', base: 215, vol: 40, desc: 'Blockchain de alta velocidad para transacciones rápidas' }
            ],
            stocks: [
                { symbol: 'AAPL', name: 'Apple', base: 230, vol: 20, desc: 'Empresa tecnológica líder en dispositivos' },
                { symbol: 'TSLA', name: 'Tesla', base: 252, vol: 30, desc: 'Vehículos eléctricos e innovación en energía' },
                { symbol: 'MSFT', name: 'Microsoft', base: 425, vol: 40, desc: 'Software y servicios en la nube líderes' }
            ]
        };

        function getPrice(asset) {
            return asset.base + (Math.random() - 0.5) * asset.vol;
        }

        function getPriceHistory(asset, days = 30) {
            const data = [];
            for (let i = days; i >= 0; i--) {
                data.push(getPrice(asset));
            }
            return data;
        }

        function renderSidebar() {
            const sidebar = document.getElementById('sidebar');
            const items = [
                { id: 'dashboard', label: 'Dashboard' },
                { id: 'trading', label: 'Trading' },
                { id: 'casino', label: 'Casino' },
                { id: 'leagues', label: 'Ligas' },
                { id: 'analytics', label: 'Análisis' },
                { id: 'education', label: 'Educación' },
                { id: 'logout', label: 'Salir' }
            ];
            sidebar.innerHTML = items.map(i => `<div class="nav-item ${state.page === i.id ? 'active' : ''}" onclick="navigate('${i.id}')">${i.label}</div>`).join('');
        }

        function navigate(page) {
            if (page === 'logout') {
                localStorage.clear();
                state.user = null;
            }
            state.page = page;
            render();
        }

        function handleLogin() {
            const username = document.getElementById('username')?.value;
            if (!username) return alert('Nombre requerido');
            state.user = { id: Date.now(), username, balance: 100000, totalWon: 0, totalLost: 0, level: 1, created: new Date() };
            DB.setUser(state.user);
            state.page = 'dashboard';
            render();
        }

        function buyAsset(symbol) {
            const amount = parseFloat(document.getElementById(`amt-${symbol}`)?.value || 0);
            if (amount <= 0) return alert('Cantidad inválida');
            const asset = [...MARKETS.crypto, ...MARKETS.stocks].find(a => a.symbol === symbol);
            const cost = getPrice(asset) * amount;
            if (state.user.balance < cost) return alert(`Insuficiente. Necesitas $${cost.toFixed(2)}`);
            state.user.balance -= cost;
            state.investments.push({ symbol, name: asset.name, amount, buyPrice: getPrice(asset), date: new Date() });
            state.transactions.push({ type: 'BUY', symbol, amount, cost, date: new Date() });
            DB.setUser(state.user);
            DB.setInvestments(state.user.id, state.investments);
            DB.setTransactions(state.user.id, state.transactions);
            alert(`✅ Invertiste $${cost.toFixed(2)} en ${symbol}`);
            document.getElementById(`amt-${symbol}`).value = '';
            render();
        }

        function playRoulette() {
            if (state.rouletteSpinning) return;
            const bet = parseFloat(document.getElementById('roulette-bet')?.value || 0);
            if (bet <= 0 || bet > state.user.balance) return alert('Apuesta inválida');
            state.user.balance -= bet;
            state.rouletteSpinning = true;
            const wheel = document.querySelector('.roulette');
            wheel.classList.add('spinning');
            setTimeout(() => {
                const won = Math.random() > 0.48;
                if (won) {
                    state.user.balance += bet * 2;
                    state.user.totalWon += bet;
                } else {
                    state.user.totalLost += bet;
                }
                DB.setUser(state.user);
                state.transactions.push({ type: 'ROULETTE', bet, result: won ? 'WIN' : 'LOSS', date: new Date() });
                DB.setTransactions(state.user.id, state.transactions);
                state.rouletteSpinning = false;
                wheel.classList.remove('spinning');
                alert(won ? `🎉 ¡GANASTE! +$${(bet * 2).toFixed(2)}` : `😢 Perdiste $${bet}`);
                document.getElementById('roulette-bet').value = '';
                render();
            }, 3000);
        }

        function createLeague() {
            const name = prompt('Nombre de la liga:');
            if (!name) return;
            const league = { id: Date.now(), name, creator: state.user.username, members: [{ username: state.user.username, balance: state.user.balance }] };
            state.groups.push(league);
            DB.setGroups(state.groups);
            render();
        }

        function joinLeague(leagueId) {
            const league = state.groups.find(l => l.id === leagueId);
            if (!league || league.members.some(m => m.username === state.user.username)) return;
            league.members.push({ username: state.user.username, balance: state.user.balance });
            DB.setGroups(state.groups);
            render();
        }

        function render() {
            renderSidebar();
            const content = document.getElementById('content');
            if (!state.user) {
                content.innerHTML = `<div class="min-h-screen flex items-center justify-center"><div class="w-full max-w-md"><div class="glass rounded-2xl p-8"><h1 class="text-4xl font-bold gradient-text mb-2">Elite Trading</h1><p class="text-gray-400 text-center mb-8">Plataforma de inversión profesional</p><input type="text" id="username" placeholder="Tu nombre" class="w-full px-4 py-3 bg-slate-800 border border-[#2d4a7b] rounded-lg text-white mb-4 focus:outline-none focus:border-[#6366f1]"><button onclick="handleLogin()" class="w-full btn-primary">Comenzar</button><p class="text-gray-500 text-center text-sm mt-6">Comienza con $100,000 de capital ficticio</p></div></div></div>`;
                return;
            }
            if (state.page === 'dashboard') {
                const invTotal = state.investments.reduce((sum, inv) => sum + (inv.amount * inv.buyPrice), 0);
                content.innerHTML = `<div><h1 class="text-4xl font-bold mb-8">Dashboard</h1><div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8"><div class="stat-card"><p class="text-gray-400 text-sm mb-2">Saldo</p><p class="text-3xl font-bold">$${state.user.balance.toLocaleString('en', {maximumFractionDigits: 0})}</p></div><div class="stat-card"><p class="text-gray-400 text-sm mb-2">Invertido</p><p class="text-3xl font-bold">$${invTotal.toLocaleString('en', {maximumFractionDigits: 0})}</p></div><div class="stat-card"><p class="text-gray-400 text-sm mb-2">Ganado</p><p class="text-3xl font-bold text-green-400">$${state.user.totalWon.toLocaleString('en', {maximumFractionDigits: 0})}</p></div><div class="stat-card"><p class="text-gray-400 text-sm mb-2">Perdido</p><p class="text-3xl font-bold text-red-400">$${state.user.totalLost.toLocaleString('en', {maximumFractionDigits: 0})}</p></div></div><div class="grid grid-cols-2 md:grid-cols-4 gap-4"><button onclick="navigate('trading')" class="card text-center py-6 hover:border-[#6366f1]"><p class="text-2xl">📈</p><p class="mt-2 font-semibold">Trading</p></button><button onclick="navigate('casino')" class="card text-center py-6 hover:border-[#6366f1]"><p class="text-2xl">🎰</p><p class="mt-2 font-semibold">Casino</p></button><button onclick="navigate('leagues')" class="card text-center py-6 hover:border-[#6366f1]"><p class="text-2xl">👥</p><p class="mt-2 font-semibold">Ligas</p></button><button onclick="navigate('analytics')" class="card text-center py-6 hover:border-[#6366f1]"><p class="text-2xl">📊</p><p class="mt-2 font-semibold">Análisis</p></button></div></div>`;
            } else if (state.page === 'trading') {
                content.innerHTML = `<div><h1 class="text-4xl font-bold mb-8">Trading</h1><div class="card"><h2 class="text-2xl font-bold mb-6">Mercados Disponibles</h2><div class="space-y-4">${[...MARKETS.crypto, ...MARKETS.stocks].map(a => {
                    const price = getPrice(a);
                    return `<div class="investment-item"><div class="flex justify-between mb-2"><div><h3 class="font-bold text-lg">${a.symbol}</h3><p class="text-sm text-gray-400">${a.name}</p><p class="text-xs text-gray-500 mt-1">${a.desc}</p></div><div class="text-right"><p class="text-2xl font-bold">$${price.toFixed(2)}</p></div></div><div class="flex gap-2"><input type="number" id="amt-${a.symbol}" placeholder="Cantidad" step="0.001" class="flex-1 px-3 py-2 bg-slate-800 border border-[#2d4a7b] rounded-lg text-white text-sm"><button onclick="buyAsset('${a.symbol}')" class="btn-primary px-4 py-2 text-sm">Invertir</button></div></div>`;
                }).join('')}</div></div>${state.investments.length > 0 ? `<div class="card mt-6"><h2 class="text-2xl font-bold mb-4">Mis Inversiones</h2>${state.investments.map((inv, i) => `<div class="investment-item"><div class="flex justify-between"><div><p class="font-bold">${inv.symbol}</p><p class="text-sm text-gray-400">${inv.amount} @ $${inv.buyPrice.toFixed(2)}</p></div><p class="font-bold">$${(inv.amount * getPrice([...MARKETS.crypto, ...MARKETS.stocks].find(a => a.symbol === inv.symbol))).toFixed(2)}</p></div></div>`).join('')}</div>` : ''}</div>`;
            } else if (state.page === 'casino') {
                content.innerHTML = `<div><h1 class="text-4xl font-bold mb-8">Casino - Ruleta</h1><div class="card"><div class="flex justify-center mb-8"><div class="roulette"><div class="ball"></div></div></div><div><p class="text-sm text-gray-400 mb-3">Apuesta tu dinero:</p><input type="number" id="roulette-bet" placeholder="Cantidad" max="${state.user.balance}" class="w-full px-4 py-2 bg-slate-800 border border-[#2d4a7b] rounded-lg text-white mb-4"><button onclick="playRoulette()" class="w-full btn-primary py-3 font-bold">Girar Ruleta</button><p class="text-sm text-gray-400 mt-4">Probabilidad: 48% de ganar (x2 apuesta)</p></div></div></div>`;
            } else if (state.page === 'leagues') {
                state.groups = DB.getGroups();
                content.innerHTML = `<div><div class="flex justify-between items-center mb-8"><h1 class="text-4xl font-bold">Ligas de Competencia</h1><button onclick="createLeague()" class="btn-primary">+ Nueva Liga</button></div><div class="grid grid-cols-1 md:grid-cols-2 gap-6">${state.groups.map(g => `<div class="card"><h3 class="text-xl font-bold mb-4">${g.name}</h3><div class="bg-slate-800 rounded-lg overflow-hidden">${g.members.sort((a, b) => b.balance - a.balance).map((m, i) => `<div class="league-row"><div class="flex items-center flex-1"><div class="rank">${i + 1}</div><span class="font-semibold">${m.username}</span></div><span class="text-green-400 font-bold">$${m.balance.toLocaleString('en', {maximumFractionDigits: 0})}</span></div>`).join('')}</div>${!g.members.some(m => m.username === state.user.username) ? `<button onclick="joinLeague(${g.id})" class="w-full btn-primary py-2 mt-4">Unirse</button>` : `<p class="text-center text-green-400 mt-4">✅ Eres miembro</p>`}</div>`).join('')}</div></div>`;
            } else if (state.page === 'analytics') {
                content.innerHTML = `<div><h1 class="text-4xl font-bold mb-8">Análisis de Portafolio</h1><div class="card"><h2 class="text-2xl font-bold mb-4">Resumen de Desempeño</h2><div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6"><div class="bg-slate-800 p-4 rounded"><p class="text-sm text-gray-400">Tasa Ganancia</p><p class="text-2xl font-bold text-green-400">${state.user.totalWon > 0 ? ((state.user.totalWon / (state.user.totalWon + state.user.totalLost) * 100) || 0).toFixed(1) : 0}%</p></div><div class="bg-slate-800 p-4 rounded"><p class="text-sm text-gray-400">ROI</p><p class="text-2xl font-bold text-blue-400">${((state.user.totalWon - state.user.totalLost) / 100000 * 100).toFixed(2)}%</p></div><div class="bg-slate-800 p-4 rounded"><p class="text-sm text-gray-400">Total Trades</p><p class="text-2xl font-bold">${state.investments.length}</p></div><div class="bg-slate-800 p-4 rounded"><p class="text-sm text-gray-400">Juegos</p><p class="text-2xl font-bold">${state.transactions.filter(t => t.type === 'ROULETTE').length}</p></div></div></div></div>`;
            } else if (state.page === 'education') {
                content.innerHTML = `<div><h1 class="text-4xl font-bold mb-8">Centro Educativo</h1><div class="grid grid-cols-1 md:grid-cols-2 gap-6"><div class="card"><h2 class="text-xl font-bold mb-4">Bitcoin (BTC)</h2><p class="text-gray-300 mb-4">Primera criptomoneda descentralizada del mundo, creada en 2009. No depende de bancos centrales.</p><div class="bg-slate-800 p-3 rounded text-sm space-y-1"><p><strong>Volatilidad:</strong> Alta</p><p><strong>Riesgo:</strong> Medio-Alto</p></div></div><div class="card"><h2 class="text-xl font-bold mb-4">Ethereum (ETH)</h2><p class="text-gray-300 mb-4">Plataforma blockchain para contratos inteligentes y aplicaciones descentralizadas.</p><div class="bg-slate-800 p-3 rounded text-sm space-y-1"><p><strong>Volatilidad:</strong> Alta</p><p><strong>Riesgo:</strong> Medio-Alto</p></div></div><div class="card"><h2 class="text-xl font-bold mb-4">Gestión de Riesgos</h2><ul class="space-y-2 text-sm text-gray-300"><li>✓ Diversifica tu portafolio</li><li>✓ Establece límites de pérdida</li><li>✓ Estudia antes de invertir</li><li>✓ Piensa a largo plazo</li></ul></div><div class="card"><h2 class="text-xl font-bold mb-4">Estrategias Populares</h2><ul class="space-y-2 text-sm text-gray-300"><li><strong>DCA:</strong> Invertir regularmente pequeñas cantidades</li><li><strong>Take Profit:</strong> Vender en objetivos definidos</li><li><strong>Stop Loss:</strong> Limitar pérdidas del portafolio</li><li><strong>Hold:</strong> Mantener a largo plazo</li></ul></div></div></div>`;
            }
        }

        state.user = DB.getUser();
        state.investments = state.user ? DB.getInvestments(state.user.id) : [];
        state.groups = DB.getGroups();
        state.transactions = state.user ? DB.getTransactions(state.user.id) : [];
        state.page = state.user ? 'dashboard' : 'login';
        render();
    </script>
</body>
</html>
