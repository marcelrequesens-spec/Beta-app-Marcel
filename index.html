<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💰 Elite Trading Casino - Dinero Ficticio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            min-height: 100vh;
        }
        .gradient-text {
            background: linear-gradient(45deg, #60a5fa, #a78bfa, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .card-glow {
            border: 1px solid rgba(96, 165, 250, 0.3);
            box-shadow: 0 0 20px rgba(96, 165, 250, 0.1), inset 0 0 20px rgba(96, 165, 250, 0.05);
        }
        .btn-premium {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.05em;
        }
        .btn-premium:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.4);
        }
        .flip-card {
            perspective: 1000px;
            cursor: pointer;
        }
        .flip-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }
        .flip-card.flipped .flip-card-inner {
            transform: rotateY(180deg);
        }
        .flip-card-front, .flip-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
        }
        .flip-card-back {
            transform: rotateY(180deg);
        }
        .animate-pulse-slow {
            animation: pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        .stat-card {
            background: rgba(30, 41, 59, 0.8);
            border-left: 3px solid #3b82f6;
        }
        @keyframes money-rain {
            0% { transform: translateY(-100px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(400px) rotate(360deg); opacity: 0; }
        }
        .money-rain {
            animation: money-rain 3s ease-in forwards;
        }
    </style>
</head>
<body>
    <div id="app"></div>
    <script>
        const DB = {
            getUser: () => JSON.parse(localStorage.getItem('user')) || null,
            setUser: (u) => localStorage.setItem('user', JSON.stringify(u)),

            setTrades: (id, t) => localStorage.setItem(`trades_${id}`, JSON.stringify(t)),
            getGames: (id) => JSON.parse(localStorage.getItem(`games_${id}`)) || [],
            setGames: (id, g) => localStorage.setItem(`games_${id}`, JSON.stringify(g))

        let user = DB.getUser();
        let page = 'login';

        function login() {
            const username = document.getElementById('username').value.trim();
            if (!username) return alert('Nombre requerido');
            user = {id: Date.now(), username, balance: 50000, luxuryItems: [], createdAt: new Date(), totalWon: 0, totalLost: 0};
            DB.setUser(user);
            page = 'dashboard';
            render();
        }

        function buyAsset() {
            const asset = document.getElementById('trading-asset').value;
            const amountStr = document.getElementById('trading-amount').value.trim();

            if (!asset) return alert('Selecciona un activo');
            if (!amountStr || isNaN(parseFloat(amountStr))) return alert('Cantidad válida requerida');

            const amount = Math.abs(parseFloat(amountStr));
            if (amount <= 0) return alert('La cantidad debe ser mayor a 0');

            const price = Prices[asset]();
            const cost = price * amount;

            if (user.balance < cost) {
                return alert(`Saldo insuficiente\nNecesitas: $${cost.toFixed(2)}\nTienes: $${user.balance.toFixed(2)}`);
            }

            user.balance -= cost;
            const trades = DB.getTrades(user.id);
            trades.push({id: Date.now(), type: 'BUY', asset, amount, price, cost, profit: 0, date: new Date()});
            DB.setTrades(user.id, trades);
            DB.setUser(user);

            gameResult = {type: 'trade', success: true, msg: `✅ Comprado ${amount} ${asset} por $${cost.toFixed(2)}`};
            document.getElementById('trading-asset').value = '';
            document.getElementById('trading-amount').value = '';
            setTimeout(() => render(), 500);
        }

        function playRoulette() {
            const betStr = document.getElementById('roulette-bet').value.trim();
            if (!betStr || isNaN(parseFloat(betStr))) return alert('Apuesta válida requerida');

            const bet = Math.abs(parseFloat(betStr));
            if (bet <= 0) return alert('La apuesta debe ser mayor a 0');
            if (user.balance < bet) return alert('Saldo insuficiente');

            const ballNumber = Math.floor(Math.random() * 37);
            const won = Math.random() > 0.48; // 48% de ganar (favorable al casino)

            if (won) {
                user.balance += bet * 2;
                user.totalWon = (user.totalWon || 0) + (bet * 2);
                gameResult = {type: 'roulette', won: true, number: ballNumber, bet, payout: bet * 2};
            } else {
                user.balance -= bet;
                user.totalLost = (user.totalLost || 0) + bet;
                gameResult = {type: 'roulette', won: false, number: ballNumber, bet};
            }

            const games = DB.getGames(user.id);
            games.push({game: 'ROULETTE', bet, result: won ? 'WIN' : 'LOSS', number: ballNumber, date: new Date()});
            DB.setGames(user.id, games);
            DB.setUser(user);

            document.getElementById('roulette-bet').value = '';
            setTimeout(() => render(), 500);
        }

        function playBlackjack() {
            const betStr = document.getElementById('blackjack-bet').value.trim();
            if (!betStr || isNaN(parseFloat(betStr))) return alert('Apuesta válida requerida');

            const bet = Math.abs(parseFloat(betStr));
            if (bet <= 0) return alert('La apuesta debe ser mayor a 0');
            if (user.balance < bet) return alert('Saldo insuficiente');

            const playerCards = [Math.floor(Math.random() * 11) + 5, Math.floor(Math.random() * 11) + 5];
            const dealerCards = [Math.floor(Math.random() * 11) + 5, Math.floor(Math.random() * 11) + 5];

            const playerTotal = Math.min(playerCards.reduce((a, b) => a + b), 21);
            const dealerTotal = Math.min(dealerCards.reduce((a, b) => a + b), 21);

            const won = playerTotal > dealerTotal || (playerTotal === 21 && playerCards.length === 2);

            if (won) {
                user.balance += bet * 1.5;
                user.totalWon = (user.totalWon || 0) + (bet * 1.5);
                gameResult = {type: 'blackjack', won: true, playerCards, dealerCards, playerTotal, dealerTotal, bet, payout: bet * 1.5};
            } else {
                user.balance -= bet;
                user.totalLost = (user.totalLost || 0) + bet;
                gameResult = {type: 'blackjack', won: false, playerCards, dealerCards, playerTotal, dealerTotal, bet};
            }

            const games = DB.getGames(user.id);
            games.push({game: 'BLACKJACK', bet, result: won ? 'WIN' : 'LOSS', playerTotal, dealerTotal, date: new Date()});
            DB.setGames(user.id, games);
            DB.setUser(user);

            document.getElementById('blackjack-bet').value = '';
            setTimeout(() => render(), 500);
        }

        function playCoinFlip() {
            const betStr = document.getElementById('coinflip-bet').value.trim();
            if (!betStr || isNaN(parseFloat(betStr))) return alert('Apuesta válida requerida');

            const bet = Math.abs(parseFloat(betStr));
            if (bet <= 0) return alert('La apuesta debe ser mayor a 0');
            if (user.balance < bet) return alert('Saldo insuficiente');

            const result = Math.random() > 0.5 ? 'HEADS' : 'TAILS';
            const won = Math.random() > 0.48;

            if (won) {
                user.balance += bet;
                user.totalWon = (user.totalWon || 0) + bet;
                gameResult = {type: 'coinflip', won: true, result, bet, payout: bet};
            } else {
                user.balance -= bet;
                user.totalLost = (user.totalLost || 0) + bet;
                gameResult = {type: 'coinflip', won: false, result, bet};
            }

            const games = DB.getGames(user.id);
            games.push({game: 'COINFLIP', bet, result: won ? 'WIN' : 'LOSS', flip: result, date: new Date()});
            DB.setGames(user.id, games);
            DB.setUser(user);

            document.getElementById('coinflip-bet').value = '';
            setTimeout(() => render(), 500);
        }

        function buyLuxury(itemId) {
            const item = Luxury.find(i => i.id === itemId);
            if (!item) return;

            if (user.balance < item.price) {
                return alert(`Saldo insuficiente\nNecesitas: $${item.price.toFixed(2)}\nTienes: $${user.balance.toFixed(2)}`);
            }

            user.balance -= item.price;
            user.luxuryItems.push({...item, boughtAt: new Date()});
            DB.setUser(user);
            gameResult = {type: 'luxury', success: true, item: item.name};
            setTimeout(() => render(), 500);
        }

        function logout() {
            localStorage.clear();
            user = null;
            page = 'login';
            gameResult = null;
            render();
        }

            if (!user) {

                                                <p class="text-xs text-slate-400">Dealer: ${gameResult.dealerCards.join(', ')}</p>
                                                <p class="text-sm font-bold text-orange-300">Total: ${gameResult.dealerTotal}</p>
                                            </div>
                                        </div>
                                        <p class="text-center font-bold text-lg mt-2 ${gameResult.won ? 'text-green-400' : 'text-red-400'}">
                                            ${gameResult.won ? '🎉 ¡GANASTE!' : '😢 Perdiste'}
                                        </p>
                                        ${gameResult.won ? `<p class="text-center text-green-400">+$${gameResult.payout.toFixed(2)}</p>` : ''}
                                    </div>` : ''}
                            </div>

                            <!-- COIN FLIP -->
                            <div class="card-glow rounded-lg p-6 backdrop-blur-xl">
                                <h3 class="text-xl font-bold mb-4 text-purple-400">🪙 Coin Flip</h3>
                                <div class="grid grid-cols-2 gap-4">
                                    <div>
                                        <p class="text-sm text-slate-400 mb-2">Apuesta (50/50)</p>
                                        <input type="number" id="coinflip-bet" placeholder="Cantidad" min="1"
                                               class="w-full px-3 py-2 bg-slate-800 border border-purple-500 rounded-lg text-white">
                                    </div>
                                    <button onclick="playCoinFlip()" class="btn-premium py-2 rounded-lg text-white font-bold">Lanzar</button>
                                </div>
                                ${gameResult && gameResult.type === 'coinflip' ?
                                    `<div class="mt-4 p-3 rounded-lg ${gameResult.won ? 'bg-green-900/30 border border-green-500' : 'bg-red-900/30 border border-red-500'}">
                                        <p class="text-center text-lg font-bold">${gameResult.result === 'HEADS' ? '🪙 HEADS' : '🪙 TAILS'}</p>
                                        <p class="text-center font-bold text-lg mt-2 ${gameResult.won ? 'text-green-400' : 'text-red-400'}">
                                            ${gameResult.won ? '🎉 ¡GANASTE!' : '😢 Perdiste'}
                                        </p>
                                        ${gameResult.won ? `<p class="text-center text-green-400">+$${gameResult.payout.toFixed(2)}</p>` : ''}
                                    </div>` : ''}
                            </div>
                        </div>
                    </div>
                `,
                luxury: `
                    <div class="min-h-screen p-4">
                        <div class="max-w-6xl mx-auto">
                            <button onclick="page='dashboard'; render()" class="mb-4 px-4 py-2 bg-slate-800 rounded-lg text-sm">← Atrás</button>

                            ${stats}

                            <h2 class="text-3xl font-bold mb-6 gradient-text">💎 Tienda de Lujos</h2>

                            ${['autos', 'relojes', 'inmuebles', 'transportes', 'joyas', 'experiencias', 'tech'].map(category => {
                                const items = Luxury.filter(i => i.category === category);
                                const categoryNames = {autos: '🏎️ Autos', relojes: '⌚ Relojes', inmuebles: '🏠 Inmuebles', transportes: '✈️ Transportes', joyas: '💎 Joyas', experiencias: '🎭 Experiencias', tech: '🖥️ Tecnología'};
                                return `
                                    <div class="mb-8">
                                        <h3 class="text-2xl font-bold mb-4 gradient-text">${categoryNames[category]}</h3>
                                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                            ${items.map(item => `
                                                <div class="card-glow rounded-lg p-4 backdrop-blur-xl">
                                                    <p class="text-4xl mb-2">${item.emoji}</p>
                                                    <h4 class="text-lg font-bold text-white mb-1">${item.name}</h4>
                                                    <p class="text-xs text-slate-400 mb-3">${item.desc}</p>
                                                    <p class="text-xl font-bold text-green-400 mb-3">$${item.price.toLocaleString()}</p>
                                                    <button onclick="buyLuxury('${item.id}')" class="w-full btn-premium py-2 rounded-lg text-white text-sm font-bold">
                                                        Comprar
                                                    </button>
                                                </div>
                                            `).join('')}
                                        </div>
                                    </div>
                                `;
                            }).join('')}

                            ${gameResult && gameResult.type === 'luxury' ?
                                `<div class="fixed top-4 right-4 card-glow bg-green-900/20 border-green-500 rounded-lg p-4 backdrop-blur-xl">
                                    <p class="text-center text-green-400 font-bold">🎉 ¡Compraste ${gameResult.item}!</p>
                                </div>` : ''}
                        </div>
                    </div>
                `,
                stats: `
                    <div class="min-h-screen p-4">
                        <div class="max-w-4xl mx-auto">
                            <button onclick="page='dashboard'; render()" class="mb-4 px-4 py-2 bg-slate-800 rounded-lg text-sm">← Atrás</button>

                            <h2 class="text-3xl font-bold mb-6 gradient-text">📊 Estadísticas</h2>

                            <div class="card-glow rounded-lg p-6 backdrop-blur-xl mb-6">
                                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                                    <div>
                                        <p class="text-sm text-slate-400">Saldo Actual</p>
                                        <p class="text-2xl font-bold text-blue-400">$${user.balance.toFixed(0)}</p>
                                    </div>
                                    <div>
                                        <p class="text-sm text-slate-400">Total Ganado</p>
                                        <p class="text-2xl font-bold text-green-400">$${(user.totalWon || 0).toFixed(0)}</p>
                                    </div>
                                    <div>
                                        <p class="text-sm text-slate-400">Total Perdido</p>
                                        <p class="text-2xl font-bold text-red-400">$${(user.totalLost || 0).toFixed(0)}</p>
                                    </div>
                                    <div>
                                        <p class="text-sm text-slate-400">Net Resultado</p>
                                        <p class="text-2xl font-bold ${(user.totalWon || 0) - (user.totalLost || 0) >= 0 ? 'text-green-400' : 'text-red-400'}">
                                            $${((user.totalWon || 0) - (user.totalLost || 0)).toFixed(0)}
                                        </p>
                                    </div>
                                </div>
                            </div>

                            <div class="card-glow rounded-lg p-6 backdrop-blur-xl">
                                <h3 class="text-xl font-bold mb-4 text-blue-300">Información de Cuenta</h3>
                                <div class="space-y-2 text-sm">
                                    <p><span class="text-slate-400">Usuario:</span> <span class="text-white">${user.username}</span></p>
                                    <p><span class="text-slate-400">Piezas de Lujo:</span> <span class="text-white">${user.luxuryItems.length}</span></p>
                                    <p><span class="text-slate-400">Creado:</span> <span class="text-white">${new Date(user.createdAt).toLocaleDateString()}</span></p>
                                </div>
                            </div>
                        </div>
                    </div>
                `
            };

            app.innerHTML = pages[page] || pages.dashboard;
        }

        render();
    </script>
</body>
</html>
