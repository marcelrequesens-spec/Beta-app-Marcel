        :root {
            --primary: #0066ff;
            --primary-dark: #0052cc;
            --secondary: #6366f1;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --border: #334155;
        }
        body {
            background: linear-gradient(135deg, var(--bg-dark) 0%, #1a1f35 100%);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(100, 116, 139, 0.2); }
        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; }
        .btn-primary { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 8px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0, 102, 255, 0.3); }
        .stat-box { background: linear-gradient(135deg, rgba(0, 102, 255, 0.1), rgba(99, 102, 241, 0.1)); border: 1px solid rgba(0, 102, 255, 0.3); border-radius: 12px; padding: 1.5rem; text-align: center; }
        .gradient-text { background: linear-gradient(135deg, #0066ff, #6366f1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .achievement-badge { background: rgba(16, 185, 129, 0.1); border: 1px solid var(--success); border-radius: 8px; padding: 1rem; text-align: center; transition: all 0.3s; }
        .achievement-badge.unlocked { background: rgba(16, 185, 129, 0.2); border-color: #10b981; }
        .achievement-badge:hover { transform: scale(1.05); }
        .rank-gold { background: rgba(251, 191, 36, 0.2); border: 1px solid #fbbf24; color: #fbbf24; }
        .rank-silver { background: rgba(148, 163, 184, 0.2); border: 1px solid #94a3b8; color: #94a3b8; }
        .rank-bronze { background: rgba(217, 119, 6, 0.2); border: 1px solid #d97706; color: #d97706; }
        .market-item { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; cursor: pointer; transition: all 0.3s; }
        .market-item:hover { border-color: var(--primary); transform: translateY(-2px); }
        .leaderboard-row { background: var(--bg-card); border-bottom: 1px solid var(--border); padding: 1rem; display: flex; justify-content: space-between; align-items: center; }
        .leaderboard-row:first-child { background: linear-gradient(135deg, rgba(251, 191, 36, 0.1), rgba(251, 191, 36, 0.05)); }
        .chart-container { height: 300px; }
    </style>
</head>

        let user = DB.getUser();

        function initUser(username) {
            user = {
                id: Date.now(),
                username,
                balance: 100000,
                totalInvested: 0,
                totalWon: 0,
                totalLost: 0,
                level: 1,
                experience: 0,
                luxuryItems: [],
                achievements: [],
                rank: 'Bronze',
                createdAt: new Date(),
                portfolio: [],
                trades: 0
            };
            DB.setUser(user);
            updateLeaderboard();
        }

        function updateLeaderboard() {
            let lb = DB.getLeaderboard();
            lb = lb.filter(u => u.id !== user.id);
            lb.push({ username: user.username, balance: user.balance, level: user.level, luxuryCount: user.luxuryItems.length, id: user.id });
            lb.sort((a, b) => b.balance - a.balance);
            DB.setLeaderboard(lb.slice(0, 20));
            leaderboard = DB.getLeaderboard();
        }

        function buyAsset(symbol) {
            const qty = parseFloat(document.getElementById('qty-input')?.value || 0);
            if (qty <= 0) return alert('Cantidad inválida');

            const asset = Object.values(MARKETS).flat().find(a => a.symbol === symbol);
            if (!asset) return;

            const price = getPrice(asset);
            const total = price * qty;

            if (user.balance < total) {
                return alert(`Saldo insuficiente. Necesitas: $${total.toFixed(2)}\nTienes: $${user.balance.toFixed(2)}`);
            }

            user.balance -= total;
            user.totalInvested += total;
            user.trades++;
            portfolio.push({ symbol, name: asset.name, qty, buyPrice: price, date: new Date() });
            user.portfolio = portfolio;

            DB.setUser(user);
            updateLeaderboard();
            alert(`✅ Comprado ${qty} ${symbol} por $${total.toFixed(2)}`);
            document.getElementById('qty-input').value = '';
            render();
        }

        function buyLuxury(itemId) {
            const item = LUXURY_ITEMS.find(i => i.id === itemId);
            if (!item) return;

            if (user.balance < item.price) {
                return alert(`Saldo insuficiente. Necesitas: $${item.price}\nTienes: $${user.balance.toFixed(2)}`);
            }

            user.balance -= item.price;
            user.luxuryItems.push(item);
            user.experience += 20;
            checkLevelUp();

            DB.setUser(user);
            updateLeaderboard();
            alert(`✅ ¡Compraste ${item.name}!`);
            render();
        }

        function checkLevelUp() {
            const newLevel = Math.floor(user.experience / 100) + 1;
            if (newLevel > user.level) {
                user.level = newLevel;
                const ranks = ['Bronze', 'Silver', 'Gold', 'Platinum', 'Diamond'];
                user.rank = ranks[Math.min(newLevel - 1, ranks.length - 1)];
                alert(`🎉 ¡Subiste al nivel ${newLevel} (${user.rank})!`);
            }
        }

        function playGame(game) {
            const bet = parseFloat(document.getElementById(`${game}-bet`)?.value || 0);
            if (bet <= 0 || user.balance < bet) return alert('Apuesta inválida');

            let won = Math.random() > 0.48;
            let payout = won ? bet * (game === 'blackjack' ? 1.5 : 1) : 0;

            user.balance = user.balance - bet + payout;
            if (won) user.totalWon += payout;
            else user.totalLost += bet;

            DB.setUser(user);
            updateLeaderboard();
            alert(won ? `🎉 ¡GANASTE! +$${payout.toFixed(2)}` : `😢 Perdiste $${bet}`);
            document.getElementById(`${game}-bet`).value = '';
            render();
        }

            localStorage.clear();
            user = null;
            page = 'login';
            render();

                                    <h3 class="text-xl font-bold mb-4 capitalize">${type}</h3>
                                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                                        ${assets.map(a => `<div class="market-item" onclick="document.getElementById('selected-asset').value='${a.symbol}'; render();"><p class="text-xl">${a.icon} ${a.symbol}</p><p class="text-sm text-slate-400">${a.name}</p><p class="text-lg font-bold text-green-400">$${getPrice(a).toFixed(2)}</p></div>`).join('')}
                                    </div>
                                </div>
                            `).join('')}
                            <input type="hidden" id="selected-asset">
                        </div>
                    </div>
                `;
            } else if (page === 'casino') {
                app.innerHTML = `
                    <div class="min-h-screen bg-gradient-to-br from-slate-950 to-red-950 p-4">
                        <div class="max-w-4xl mx-auto">
                            <button onclick="page='dashboard'; render()" class="mb-4 px-4 py-2 bg-slate-700 rounded-lg text-sm">← Atrás</button>
                            <h2 class="text-3xl font-bold gradient-text mb-6">🎰 Casino</h2>
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                                <div class="card"><h3 class="font-bold mb-4">🎡 Ruleta</h3><input type="number" id="roulette-bet" placeholder="Apuesta" min="1" class="w-full px-3 py-2 bg-slate-800 border border-slate-700 rounded-lg text-white mb-2"><button onclick="playGame('roulette')" class="w-full btn-primary">Girar</button></div>
                                <div class="card"><h3 class="font-bold mb-4">🃏 Blackjack</h3><input type="number" id="blackjack-bet" placeholder="Apuesta" min="1" class="w-full px-3 py-2 bg-slate-800 border border-slate-700 rounded-lg text-white mb-2"><button onclick="playGame('blackjack')" class="w-full btn-primary">Jugar</button></div>
                                <div class="card"><h3 class="font-bold mb-4">🪙 Coin Flip</h3><input type="number" id="coinflip-bet" placeholder="Apuesta" min="1" class="w-full px-3 py-2 bg-slate-800 border border-slate-700 rounded-lg text-white mb-2"><button onclick="playGame('coinflip')" class="w-full btn-primary">Lanzar</button></div>
                            </div>
                        </div>
                    </div>
                `;
            } else if (page === 'shop') {
                app.innerHTML = `
                    <div class="min-h-screen bg-gradient-to-br from-slate-950 to-yellow-950 p-4">
                        <div class="max-w-7xl mx-auto">
                            <button onclick="page='dashboard'; render()" class="mb-4 px-4 py-2 bg-slate-700 rounded-lg text-sm">← Atrás</button>
                            <h2 class="text-3xl font-bold gradient-text mb-6">💎 Tienda de Lujos</h2>
                            ${categories.map(cat => `
                                <div class="mb-8">
                                    <h3 class="text-2xl font-bold mb-4">${cat}</h3>
                                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                                        ${LUXURY_ITEMS.filter(i => i.category === cat).map(item => `
                                            <div class="card hover:border-yellow-500 transition">
                                                <p class="text-4xl mb-2">${item.icon}</p>
                                                <h4 class="font-bold mb-1 text-sm">${item.name}</h4>
                                                <p class="text-xl font-bold text-green-400 mb-3">$${item.price.toLocaleString()}</p>
                                                <button onclick="buyLuxury('${item.id}')" class="w-full btn-primary text-sm">Comprar</button>
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            } else if (page === 'leaderboard') {
                app.innerHTML = `
                    <div class="min-h-screen bg-gradient-to-br from-slate-950 to-purple-950 p-4">
                        <div class="max-w-4xl mx-auto">
                            <button onclick="page='dashboard'; render()" class="mb-4 px-4 py-2 bg-slate-700 rounded-lg text-sm">← Atrás</button>
                            <h2 class="text-3xl font-bold gradient-text mb-6">🏆 Leaderboard Global</h2>
                            <div class="card">
                                ${leaderboard.map((u, i) => `
                                    <div class="leaderboard-row">
                                        <div class="flex items-center gap-4">
                                            <p class="text-2xl font-bold w-8">${i + 1}</p>
                                            <div>
                                                <p class="font-bold">${u.username}</p>
                                                <p class="text-xs text-slate-400">Nivel ${u.level} • ${u.luxuryCount} items</p>
                                            </div>
                                        </div>
                                        <p class="text-xl font-bold text-green-400">$${u.balance.toLocaleString()}</p>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                `;
            }
        }

        render();
    </script>
</body>
</html>
