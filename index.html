        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #0066ff;
            --primary-dark: #0052cc;
            --secondary: #6366f1;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --border: #334155;
        }
        body {
            background: linear-gradient(135deg, var(--bg-dark) 0%, #1a1f35 100%);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow-x: hidden;
        }
        .glass {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(100, 116, 139, 0.2);
        }
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 102, 255, 0.3);
        }
        .stat-box {
            background: linear-gradient(135deg, rgba(0, 102, 255, 0.1), rgba(99, 102, 241, 0.1));
            border: 1px solid rgba(0, 102, 255, 0.3);
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
        }
        .gradient-text {
            background: linear-gradient(135deg, #0066ff, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .achievement {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid var(--success);
            border-radius: 8px;
            padding: 1rem;
            text-align: center;
        }
        .market-item {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem;
            transition: all 0.3s ease;
        }
        .market-item:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
        }
        .chart-container {
            height: 300px;
            margin-top: 1rem;
        }
        .level-badge {
            display: inline-block;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.875rem;
        }
        .rank-badge {
            display: inline-block;
            padding: 0.5rem 1rem;
            border-radius: 20px;

        }

    </style>

        // ============ TRADING LOGIC ============
        function buyAsset(assetKey) {
            const asset = findAsset(assetKey);
            if (!asset) return showAlert('Activo no encontrado', 'danger');

            const quantityStr = document.getElementById('quantity-input')?.value?.trim();
            if (!quantityStr || isNaN(quantityStr) || parseFloat(quantityStr) <= 0) {
                return showAlert('Ingresa una cantidad válida mayor a 0', 'danger');
            }

            const quantity = parseFloat(quantityStr);
            const price = getPrice(asset);
            const total = price * quantity;

            if (user.balance < total) {
                return showAlert(`Saldo insuficiente. Necesitas: $${total.toFixed(2)}, Tienes: $${user.balance.toFixed(2)}`, 'danger');
            }

            user.balance -= total;
            user.totalInvested += total;
            portfolio.push({ symbol: asset.symbol, name: asset.name, quantity, buyPrice: price, buyDate: new Date() });
            user.portfolio = portfolio;
            user.trades = (user.trades || []).concat({ type: 'BUY', asset: asset.symbol, quantity, price, total, date: new Date() });

            DB.setUser(user);
            DB.setPortfolio(user.id, portfolio);
            showAlert(`Comprado ${quantity} ${asset.symbol} por $${total.toFixed(2)}`, 'success');
            document.getElementById('quantity-input').value = '';
            render();
        }

        function sellAsset(index) {
            if (!portfolio[index]) return;
            const holding = portfolio[index];
            const asset = findAsset(holding.symbol);
            const currentPrice = getPrice(asset);
            const saleValue = holding.quantity * currentPrice;
            const profit = saleValue - (holding.quantity * holding.buyPrice);

            user.balance += saleValue;
            if (profit > 0) user.totalWon += profit;
            else user.totalLost += Math.abs(profit);

            portfolio.splice(index, 1);
            user.portfolio = portfolio;
            user.trades = (user.trades || []).concat({ type: 'SELL', asset: holding.symbol, quantity: holding.quantity, price: currentPrice, total: saleValue, profit, date: new Date() });

            DB.setUser(user);
            DB.setPortfolio(user.id, portfolio);
            showAlert(`Vendido por $${saleValue.toFixed(2)} (Ganancia: $${profit.toFixed(2)})`, 'success');
            render();
        }

        function findAsset(symbol) {
            for (const market of Object.values(MARKETS)) {

            const bet = parseFloat(betStr);
            if (user.balance < bet) return showAlert('Saldo insuficiente', 'danger');

            const number = Math.floor(Math.random() * 37);
            const won = Math.random() > 0.48;
            const payout = won ? bet * 2 : 0;

            user.balance = user.balance - bet + payout;
            if (won) user.totalWon += payout;
            else user.totalLost += bet;

            DB.setUser(user);
            showAlert(`Número: ${number} - ${won ? '🎉 ¡GANASTE!' : '😢 Perdiste'} ${won ? '+' : '-'}$${(won ? payout : bet).toFixed(2)}`, won ? 'success' : 'danger');
            document.getElementById('roulette-bet').value = '';
            render();
        }

        function playBlackjack() {
            const betStr = document.getElementById('blackjack-bet')?.value?.trim();
            if (!betStr || isNaN(betStr) || parseFloat(betStr) <= 0) {
                return showAlert('Apuesta válida requerida', 'danger');
            }

            const bet = parseFloat(betStr);
            if (user.balance < bet) return showAlert('Saldo insuficiente', 'danger');

            const playerCards = [Math.floor(Math.random() * 11) + 5, Math.floor(Math.random() * 11) + 5];
            const dealerCards = [Math.floor(Math.random() * 11) + 5, Math.floor(Math.random() * 11) + 5];
            const playerTotal = Math.min(playerCards.reduce((a, b) => a + b), 21);
            const dealerTotal = Math.min(dealerCards.reduce((a, b) => a + b), 21);
            const won = playerTotal > dealerTotal && playerTotal <= 21;
            const payout = won ? bet * 1.5 : 0;

            user.balance = user.balance - bet + payout;
            if (won) user.totalWon += payout;
            else user.totalLost += bet;

            DB.setUser(user);
            showAlert(`Tu: ${playerTotal} | Dealer: ${dealerTotal} - ${won ? '🎉 ¡GANASTE!' : '😢 Perdiste'}`, won ? 'success' : 'danger');
            document.getElementById('blackjack-bet').value = '';
            render();
        }

        function playCoinFlip() {
            const betStr = document.getElementById('coinflip-bet')?.value?.trim();
            if (!betStr || isNaN(betStr) || parseFloat(betStr) <= 0) {
                return showAlert('Apuesta válida requerida', 'danger');
            }

            const bet = parseFloat(betStr);
            if (user.balance < bet) return showAlert('Saldo insuficiente', 'danger');

            const result = Math.random() > 0.5 ? 'HEADS' : 'TAILS';
            const won = Math.random() > 0.48;
            const payout = won ? bet : 0;

            user.balance = user.balance - bet + payout;
            if (won) user.totalWon += payout;
            else user.totalLost += bet;

            DB.setUser(user);
            showAlert(`${result} - ${won ? '🎉 ¡GANASTE!' : '😢 Perdiste'} ${won ? '+' : '-'}$${(won ? payout : bet).toFixed(2)}`, won ? 'success' : 'danger');
            document.getElementById('coinflip-bet').value = '';
            render();
        }

        // ============ SHOPPING ============
        function buyLuxury(itemId) {
            const item = LUXURY_ITEMS.find(i => i.id === itemId);
            if (!item) return;

            if (user.balance < item.price) {
                return showAlert(`Saldo insuficiente. Necesitas: $${item.price}, Tienes: $${user.balance.toFixed(2)}`, 'danger');
            }

            user.balance -= item.price;
            user.luxuryItems.push({ ...item, boughtAt: new Date() });
            user.experience += 10;
            checkLevelUp();

            DB.setUser(user);
            showAlert(`¡Compraste ${item.name}!`, 'success');
            render();
        }

        // ============ UTILITY ============
        function showAlert(msg, type = 'info') {
            const alerts = document.getElementById('alerts');
            if (!alerts) return;
            const div = document.createElement('div');
            div.className = `p-4 rounded-lg mb-2 ${type === 'success' ? 'bg-green-900/30 border border-green-500 text-green-400' : type === 'danger' ? 'bg-red-900/30 border border-red-500 text-red-400' : 'bg-blue-900/30 border border-blue-500 text-blue-400'}`;
            div.textContent = msg;
            alerts.appendChild(div);
            setTimeout(() => div.remove(), 3000);
        }

        function checkLevelUp() {
            const newLevel = Math.floor(user.experience / 100) + 1;
            if (newLevel > user.level) {
                user.level = newLevel;
                showAlert(`¡Subiste al nivel ${newLevel}!`, 'success');
            }
        }

        function logout() {
            localStorage.clear();
            user = null;
            page = 'login';
            render();
        }

        // ============ RENDER ============
        function render() {
            const app = document.getElementById('app');
            if (!user) {
                app.innerHTML = `
                    <div class="min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-slate-950 to-blue-950">
                        <div class="w-full max-w-md">
                            <div class="glass rounded-2xl p-8 backdrop-blur-xl">
                                <h1 class="text-5xl font-bold gradient-text text-center mb-2">ELITE</h1>
                                <h2 class="text-3xl font-bold text-center mb-2">Trading Pro</h2>
                                <p class="text-center text-slate-400 mb-8">Investment & Casino Platform</p>
                                <div class="space-y-4">
                                    <input type="text" id="username" placeholder="Tu nombre de trader" class="w-full px-4 py-3 bg-slate-800 border border-blue-500 rounded-lg text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500">
                                    <button onclick="initUser(document.getElementById('username').value); page='dashboard'; render();" class="w-full btn-primary py-3 rounded-lg text-white font-bold">
                                        Comenzar Trading
                                    </button>
                                </div>
                                <p class="text-center text-slate-400 text-xs mt-6">Comienza con $100,000 en dinero ficticio</p>
                            </div>
                        </div>
                    </div>
                `;
                return;
            }

            portfolio = DB.getPortfolio(user.id) || [];
            const categoryTotals = {};
            LUXURY_ITEMS.forEach(item => {
                if (!categoryTotals[item.category]) categoryTotals[item.category] = 0;
                const owned = user.luxuryItems.filter(l => l.category === item.category).length;
                categoryTotals[item.category] = owned;
            });

            if (page === 'dashboard') {
                app.innerHTML = `
                    <div class="min-h-screen bg-gradient-to-br from-slate-950 to-blue-950 p-4">
                        <div class="max-w-7xl mx-auto">
                            <div class="flex justify-between items-center mb-8">
                                <div>
                                    <h1 class="text-4xl font-bold gradient-text">${user.username}</h1>
                                    <p class="text-slate-400">Nivel ${user.level} • ${user.rank} Rank</p>
                                </div>
                                <button onclick="logout()" class="px-4 py-2 bg-red-600 rounded-lg text-sm font-bold hover:bg-red-700">Salir</button>
                            </div>

                            <div id="alerts"></div>

                            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
                                <div class="stat-box">
                                    <p class="text-slate-400 text-sm">Saldo</p>
                                    <p class="text-3xl font-bold text-blue-400">$${user.balance.toFixed(0)}</p>
                                </div>
                                <div class="stat-box">
                                    <p class="text-slate-400 text-sm">Ganado</p>
                                    <p class="text-3xl font-bold text-green-400">$${user.totalWon.toFixed(0)}</p>
                                </div>
                                <div class="stat-box">
                                    <p class="text-slate-400 text-sm">Perdido</p>
                                    <p class="text-3xl font-bold text-red-400">$${user.totalLost.toFixed(0)}</p>
                                </div>
                                <div class="stat-box">
                                    <p class="text-slate-400 text-sm">Posesiones</p>
                                    <p class="text-3xl font-bold text-purple-400">${user.luxuryItems.length}</p>
                                </div>
                            </div>

                            <div class="grid grid-cols-1 md:grid-cols-4 gap-3 mb-8">
                                <button onclick="page='trading'; render()" class="card hover:border-blue-500 transition">
                                    <p class="text-2xl mb-2">📈</p>
                                    <p class="font-bold">Trading</p>
                                    <p class="text-xs text-slate-400">Mercados</p>
                                </button>
                                <button onclick="page='casino'; render()" class="card hover:border-red-500 transition">
                                    <p class="text-2xl mb-2">🎰</p>
                                    <p class="font-bold">Casino</p>
                                    <p class="text-xs text-slate-400">Juegos</p>
                                </button>
                                <button onclick="page='shop'; render()" class="card hover:border-yellow-500 transition">
                                    <p class="text-2xl mb-2">💎</p>
                                    <p class="font-bold">Tienda</p>
                                    <p class="text-xs text-slate-400">Lujos</p>
                                </button>
                                <button onclick="page='analytics'; render()" class="card hover:border-purple-500 transition">
                                    <p class="text-2xl mb-2">📊</p>
                                    <p class="font-bold">Análisis</p>
                                    <p class="text-xs text-slate-400">Performance</p>
                                </button>
                            </div>

                            <div class="card">
                                <h3 class="text-xl font-bold mb-4">Tu Portafolio</h3>
                                ${portfolio.length === 0 ? '<p class="text-slate-400">Sin inversiones aún. ¡Comienza a tradear!</p>' : `
                                    <div class="space-y-2">
                                        ${portfolio.map((h, i) => `
                                            <div class="flex justify-between items-center p-2 bg-slate-800/50 rounded">
                                                <div>
                                                    <p class="font-bold">${h.name} (${h.symbol})</p>
                                                    <p class="text-xs text-slate-400">${h.quantity} unidades @ $${h.buyPrice.toFixed(2)}</p>
                                                </div>
                                                <button onclick="sellAsset(${i})" class="px-3 py-1 bg-red-600 rounded text-sm hover:bg-red-700">Vender</button>
                                            </div>
                                        `).join('')}
                                    </div>
                                `}
                            </div>
                        </div>
                    </div>
                `;
            } else if (page === 'trading') {
                app.innerHTML = `
                    <div class="min-h-screen bg-gradient-to-br from-slate-950 to-blue-950 p-4">
                        <div class="max-w-6xl mx-auto">
                            <button onclick="page='dashboard'; render()" class="mb-4 px-4 py-2 bg-slate-700 rounded-lg text-sm">← Atrás</button>

                            <h2 class="text-3xl font-bold gradient-text mb-6">Mercados de Trading</h2>

                            <div id="alerts"></div>

                            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
                                <div class="card">
                                    <h3 class="font-bold mb-4">Criptomonedas</h3>
                                    ${MARKETS.crypto.map(asset => `
                                        <button onclick="selectedAsset='${asset.symbol}'; render();" class="w-full text-left p-2 hover:bg-slate-800 rounded mb-2">
                                            ${asset.icon} ${asset.symbol}
                                        </button>
                                    `).join('')}
                                </div>
                                <div class="card">
                                    <h3 class="font-bold mb-4">Acciones</h3>
                                    ${MARKETS.stocks.map(asset => `
                                        <button onclick="selectedAsset='${asset.symbol}'; render();" class="w-full text-left p-2 hover:bg-slate-800 rounded mb-2">
                                            ${asset.icon} ${asset.symbol}
                                        </button>
                                    `).join('')}
                                </div>
                                <div class="card">
                                    <h3 class="font-bold mb-4">Commodities</h3>
                                    ${MARKETS.commodities.map(asset => `
                                        <button onclick="selectedAsset='${asset.symbol}'; render();" class="w-full text-left p-2 hover:bg-slate-800 rounded mb-2">
                                            ${asset.icon} ${asset.symbol}
                                        </button>
                                    `).join('')}
                                </div>
                            </div>

                            ${selectedAsset ? `
                                <div class="card">
                                    <h3 class="text-xl font-bold mb-4">${findAsset(selectedAsset).name} (${selectedAsset})</h3>
                                    <p class="text-2xl font-bold text-blue-400 mb-4">$${getPrice(findAsset(selectedAsset)).toFixed(2)}</p>
                                    <div class="grid grid-cols-2 gap-4">
                                        <div>
                                            <label class="text-sm text-slate-400 block mb-2">Cantidad</label>
                                            <input type="number" id="quantity-input" placeholder="0.5" step="0.001" min="0" class="w-full px-3 py-2 bg-slate-800 border border-slate-700 rounded-lg text-white">
                                        </div>
                                        <button onclick="buyAsset('${selectedAsset}')" class="btn-primary self-end">Comprar</button>
                                    </div>
                                </div>
                            ` : ''}
                        </div>
                    </div>
                `;
            } else if (page === 'casino') {
                app.innerHTML = `
                    <div class="min-h-screen bg-gradient-to-br from-slate-950 to-red-950 p-4">
                        <div class="max-w-4xl mx-auto">
                            <button onclick="page='dashboard'; render()" class="mb-4 px-4 py-2 bg-slate-700 rounded-lg text-sm">← Atrás</button>

                            <h2 class="text-3xl font-bold gradient-text mb-6">🎰 Casino Elite</h2>

                            <div id="alerts"></div>

                            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                                <div class="card border-red-500">
                                    <h3 class="font-bold mb-4">🎡 Ruleta</h3>
                                    <input type="number" id="roulette-bet" placeholder="Apuesta" min="1" class="w-full px-3 py-2 bg-slate-800 border border-slate-700 rounded-lg text-white mb-2">
                                    <button onclick="playRoulette()" class="w-full btn-primary">Girar</button>
                                </div>
                                <div class="card border-purple-500">
                                    <h3 class="font-bold mb-4">🃏 Blackjack</h3>
                                    <input type="number" id="blackjack-bet" placeholder="Apuesta" min="1" class="w-full px-3 py-2 bg-slate-800 border border-slate-700 rounded-lg text-white mb-2">
                                    <button onclick="playBlackjack()" class="w-full btn-primary">Jugar</button>
                                </div>
                                <div class="card border-yellow-500">
                                    <h3 class="font-bold mb-4">🪙 Coin Flip</h3>
                                    <input type="number" id="coinflip-bet" placeholder="Apuesta" min="1" class="w-full px-3 py-2 bg-slate-800 border border-slate-700 rounded-lg text-white mb-2">
                                    <button onclick="playCoinFlip()" class="w-full btn-primary">Lanzar</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            } else if (page === 'shop') {
                const categories = [...new Set(LUXURY_ITEMS.map(i => i.category))];
                app.innerHTML = `
                    <div class="min-h-screen bg-gradient-to-br from-slate-950 to-yellow-950 p-4">
                        <div class="max-w-7xl mx-auto">
                            <button onclick="page='dashboard'; render()" class="mb-4 px-4 py-2 bg-slate-700 rounded-lg text-sm">← Atrás</button>

                            <h2 class="text-3xl font-bold gradient-text mb-6">💎 Tienda de Lujos</h2>

                            <div id="alerts"></div>

                            ${categories.map(cat => `
                                <div class="mb-8">
                                    <h3 class="text-2xl font-bold mb-4">${cat}</h3>
                                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                                        ${LUXURY_ITEMS.filter(i => i.category === cat).map(item => `
                                            <div class="card hover:border-yellow-500 transition">
                                                <p class="text-4xl mb-2">${item.icon}</p>
                                                <h4 class="font-bold mb-1">${item.name}</h4>
                                                <p class="text-xs text-slate-400 mb-3">${item.desc}</p>
                                                <p class="text-xl font-bold text-green-400 mb-3">$${item.price.toLocaleString()}</p>
                                                <button onclick="buyLuxury('${item.id}')" class="w-full btn-primary text-sm">Comprar</button>
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            } else if (page === 'analytics') {
                app.innerHTML = `
                    <div class="min-h-screen bg-gradient-to-br from-slate-950 to-purple-950 p-4">
                        <div class="max-w-6xl mx-auto">
                            <button onclick="page='dashboard'; render()" class="mb-4 px-4 py-2 bg-slate-700 rounded-lg text-sm">← Atrás</button>

                            <h2 class="text-3xl font-bold gradient-text mb-6">📊 Análisis & Performance</h2>

                            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
                                <div class="stat-box">
                                    <p class="text-slate-400 text-sm">ROI</p>
                                    <p class="text-3xl font-bold text-green-400">${((user.totalWon - user.totalLost) / user.totalInvested * 100).toFixed(1)}%</p>
                                </div>
                                <div class="stat-box">
                                    <p class="text-slate-400 text-sm">Win Rate</p>
                                    <p class="text-3xl font-bold text-blue-400">${user.totalWon > 0 ? (user.totalWon / (user.totalWon + user.totalLost) * 100).toFixed(1) : 0}%</p>
                                </div>
                                <div class="stat-box">
                                    <p class="text-slate-400 text-sm">Total Trades</p>
                                    <p class="text-3xl font-bold text-purple-400">${(user.trades || []).length}</p>
                                </div>
                            </div>

                            <div class="card">
                                <h3 class="font-bold mb-4">Posesiones por Categoría</h3>
                                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                                    ${Object.entries(categoryTotals).map(([cat, count]) => `
                                        <div class="bg-slate-800/50 p-3 rounded text-center">
                                            <p class="text-sm text-slate-400">${cat}</p>
                                            <p class="text-2xl font-bold">${count}</p>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }
        }

        render();
    </script>
</body>
</html>
